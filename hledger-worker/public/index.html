<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>hledger</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#2e2e2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="hledger" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #f7f6f3;
      --surface:    #ffffff;
      --border:     #e8e6e1;
      --text:       #2e2e2e;
      --text-muted: #9b9793;
      --accent:     #37352f;
      --positive:   #2d6a4f;
      --negative:   #c0392b;
      --radius:     6px;
      --max-w:      520px;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      font-weight: 400;
    }

    /* ── Layout ── */
    .app {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 0 0 calc(80px + env(safe-area-inset-bottom, 0px));
    }

    /* ── Header ── */
    header {
      padding: calc(28px + env(safe-area-inset-top, 0px)) 20px 0;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: var(--accent);
    }

    .sync-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px 20px;
      border-bottom: 1px solid var(--border);
    }

    .sync-row {
      gap: 8px;
    }

    .sync-btn {
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 7px 14px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .sync-btn:hover { opacity: 0.8; }
    .sync-btn:disabled { opacity: 0.4; cursor: default; }

    .sync-timestamp {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 300;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      gap: 0;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }

    nav::-webkit-scrollbar { display: none; }

    nav button {
      font-family: 'Montserrat', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      padding: 14px 16px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }

    nav button.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    nav button:hover:not(.active) { color: var(--text); }

    /* ── View container ── */
    .view {
      padding: 24px 20px;
      display: none;
    }

    .view.active { display: block; }

    /* ── Section title ── */
    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    /* ── Account rows ── */
    .account-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    .account-row:last-child { border-bottom: none; }

    .account-name {
      color: var(--text);
      font-weight: 400;
    }

    .account-name.indent-1 { padding-left: 16px; }
    .account-name.indent-2 { padding-left: 32px; }
    .account-name.indent-3 { padding-left: 48px; }

    .account-amount {
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      font-size: 13px;
    }

    .amount-positive { color: var(--positive); }
    .amount-negative { color: var(--negative); }
    .amount-neutral  { color: var(--text); }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
    }

    .card-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .card-value {
      font-size: 22px;
      font-weight: 300;
      letter-spacing: -0.5px;
      font-variant-numeric: tabular-nums;
    }

    /* ── Transaction list ── */
    .txn {
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }

    .txn:last-child { border-bottom: none; }

    .txn-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 3px;
    }

    .txn-desc {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .txn-amount {
      font-size: 13px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .txn-meta {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 300;
    }

    /* ── Monthly table ── */
    .monthly-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    .monthly-table th {
      text-align: left;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 8px 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .monthly-table th:last-child { text-align: right; }

    .monthly-table td {
      padding: 9px 8px 9px 0;
      border-bottom: 1px solid var(--border);
      font-variant-numeric: tabular-nums;
      vertical-align: top;
    }

    .monthly-table td:last-child { text-align: right; }
    .monthly-table tr:last-child td { border-bottom: none; }

    /* ── State messages ── */
    .state-msg {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 300;
      padding: 40px 0;
      text-align: center;
    }

    .error-msg {
      font-size: 12px;
      color: var(--negative);
      padding: 12px;
      background: #fdf0ef;
      border-radius: var(--radius);
      margin-bottom: 12px;
    }

    /* ── Bottom nav (mobile) ── */
  /* ── Summary cards ── */
  .summary-cards {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .summary-card {
    background: var(--surface);
    padding: 14px 16px;
  }

  .summary-card .card-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .summary-card .card-value {
    font-size: 15px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.3px;
  }

  /* ── Month selector ── */
  .month-select-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .month-select {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 500;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    color: var(--text);
    cursor: pointer;
    flex: 1;
  }

  .month-select:focus { outline: none; border-color: var(--accent); }

  /* ── Footer note ── */
  .view-footer {
    margin-top: 32px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 300;
    line-height: 1.6;
  }

  .view-footer code {
    font-family: 'Courier New', monospace;
    font-size: 10px;
    background: var(--border);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--accent);
  }


  /* ── Offline banner ── */
  .offline-banner {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: #c0392b;
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    text-align: center;
    padding: calc(env(safe-area-inset-top, 0px) + 10px) 16px 10px;
    z-index: 600;
    letter-spacing: 0.3px;
  }

  .offline-banner.visible { display: block; }

  /* Push content down when banner visible */
  body.is-offline header { padding-top: calc(28px + env(safe-area-inset-top, 0px) + 37px) !important; }

  /* ── Toast notification ── */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    padding: 12px 24px;
    border-radius: 24px;
    opacity: 0;
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 500;
    white-space: nowrap;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Add sheet ── */
  .add-sheet {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .add-sheet-inner {
    max-width: var(--max-w);
    width: 100%;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .add-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 20px 12px;
    border-bottom: 1px solid var(--border);
  }

  .add-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.2px;
  }

  .add-back, .add-close {
    font-family: 'Montserrat', sans-serif;
    background: none;
    border: none;
    font-size: 18px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: var(--radius);
    line-height: 1;
  }

  .add-back:hover, .add-close:hover { color: var(--accent); }

  .add-progress {
    height: 2px;
    background: var(--border);
  }

  .add-progress-bar {
    height: 2px;
    background: var(--accent);
    transition: width 0.25s ease;
  }

  .add-body {
    flex: 1;
    overflow-y: auto;
    padding: 28px 20px 40px;
  }

  /* Steps */
  .step-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }


  .step-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }

  .step-option {
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 400;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    text-align: left;
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  .step-option:hover, .step-option.selected {
    border-color: var(--accent);
    background: #f0efe9;
  }

  .step-input {
    font-family: 'Montserrat', sans-serif;
    font-size: 15px;
    font-weight: 400;
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    background: var(--surface);
    color: var(--text);
    outline: none;
    margin-bottom: 8px;
  }

  .step-input:focus { border-color: var(--accent); }

  .step-next {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 14px 24px;
    width: 100%;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.15s;
  }

  .step-next:hover { opacity: 0.85; }
  .step-next:disabled { opacity: 0.35; cursor: default; }

  /* Autocomplete dropdown */
  .autocomplete-wrap { position: relative; margin-bottom: 8px; }

  .input-clear-btn {
    position: absolute;
    right: 10px;
    top: 0;
    bottom: 0;
    margin: auto;
    height: 24px;
    width: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: none;
    font-size: 14px;
    color: var(--text-muted);
    cursor: pointer;
    border-radius: 50%;
    line-height: 1;
  }

  .input-clear-btn:hover { color: var(--accent); background: var(--border); }

  .autocomplete-list {
    position: absolute;
    top: calc(100% + 2px);
    left: 0; right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    max-height: 220px;
    overflow-y: auto;
    z-index: 300;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }

  .autocomplete-item {
    padding: 12px 16px;
    font-size: 13px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    color: var(--text);
  }

  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:hover, .autocomplete-item.highlighted { background: #f0efe9; }

  /* Preview */
  .preview-entry {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    white-space: pre-wrap;
    word-break: break-all;
    overflow-wrap: break-word;
    color: var(--accent);
    margin-bottom: 20px;
    line-height: 1.7;
    overflow-x: hidden;
  }

  .preview-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .confirm-btn {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    background: var(--positive);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 14px 24px;
    width: 100%;
    cursor: pointer;
    margin-bottom: 10px;
    transition: opacity 0.15s;
  }

  .confirm-btn:hover { opacity: 0.85; }
  .confirm-btn:disabled { opacity: 0.35; cursor: default; }

  .cancel-btn {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 500;
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 24px;
    width: 100%;
    cursor: pointer;
    color: var(--text-muted);
  }

  .success-msg {
    text-align: center;
    padding: 40px 20px;
  }

  .success-msg .check {
    font-size: 36px;
    margin-bottom: 12px;
  }

  .success-msg p {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 300;
  }

    @media (max-width: 540px) {
      nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--surface);
        border-top: 1px solid var(--border);
        border-bottom: none;
        justify-content: space-around;
        padding: 0 0 env(safe-area-inset-bottom, 0px);
        z-index: 100;
      }

      nav button {
        flex: 1;
        padding: 12px 4px;
        font-size: 10px;
        border-bottom: none;
        border-top: 2px solid transparent;
      }

      nav button.active {
        border-bottom: none;
        border-top-color: var(--accent);
      }
    }
  </style>
</head>
<body>
<div class="offline-banner" id="offlineBanner">You are offline — showing cached data</div>
<div class="app">

  <header>
    <h1>hledger | nayakashish</h1>
  </header>

  <div class="sync-row">
    <button class="sync-btn" id="addBtn" onclick="openAdd()">Add</button>
    <button class="sync-btn" id="syncBtn" onclick="syncNow()">Sync</button>
    <span class="sync-timestamp" id="syncTimestamp">not synced yet</span>
  </div>

  <div class="summary-cards" id="summaryCards"></div>

  <nav>
    <button class="active" onclick="showView('balance', this)">Balance</button>
    <button onclick="showView('is', this)">Income</button>
    <button onclick="showView('monthly', this)">Monthly</button>
    <button onclick="showView('transactions', this)">Transactions</button>
  </nav>

  <div id="view-balance" class="view active">
    <div class="state-msg">Tap sync to load data.</div>
  </div>

  <div id="view-is" class="view">
    <div class="state-msg">Tap sync to load data.</div>
  </div>

  <div id="view-monthly" class="view">
    <div class="state-msg">Tap sync to load data.</div>
  </div>

  <div id="view-transactions" class="view">
    <div class="state-msg">Tap sync to load data.</div>
  </div>

</div>

<div id="toast" class="toast"></div>

<!-- ── Add Transaction Sheet ── -->
<div id="addSheet" class="add-sheet" style="display:none">
  <div class="add-sheet-inner">
    <div class="add-header">
      <button class="add-back" id="addBackBtn" onclick="addBack()">&#8592;</button>
      <span class="add-title" id="addTitle">Date</span>
      <button class="add-close" onclick="closeAdd()">&#x2715;</button>
    </div>
    <div class="add-progress">
      <div class="add-progress-bar" id="addProgressBar"></div>
    </div>
    <div class="add-body" id="addBody"></div>
  </div>
</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────────
  // When served from the Worker, API calls go to /api/* on the same origin.
  const API = '';

  // ── State ───────────────────────────────────────────────────────────────
  let cache = {};

  const CACHE_KEY = 'hledger_cache';
  const SYNC_KEY  = 'hledger_last_sync';

  function saveCache() {
    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
      localStorage.setItem(SYNC_KEY, new Date().toISOString());
    } catch(e) {}
  }

  function loadCache() {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (raw) cache = JSON.parse(raw);
      const ts = localStorage.getItem(SYNC_KEY);
      if (ts) {
        const dt = new Date(ts);
        const time = dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        const date = dt.toLocaleDateString([], { month: 'short', day: 'numeric' });
        const isToday = dt.toDateString() === new Date().toDateString();
        document.getElementById('syncTimestamp').textContent =
          'last synced ' + (isToday ? time : date + ' ' + time);
      }
    } catch(e) {}
  }

  // ── Startup — restore from cache immediately ─────────────────────────────
  (function init() {
    loadCache();
    if (cache['balance']) renderSummaryCards(cache['balance']);
    const active = document.querySelector('.view.active');
    if (active) {
      const name = active.id.replace('view-', '');
      if (cache[name]) renderView(name, cache[name]);
      else if (Object.keys(cache).length === 0) {
        active.innerHTML = '<div class="state-msg">Tap sync to load data.</div>';
      }
    }
  })();

  // ── Navigation ──────────────────────────────────────────────────────────
  function showView(name, btn) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    btn.classList.add('active');

    if (cache[name]) renderView(name, cache[name]);
  }

  // ── Sync ─────────────────────────────────────────────────────────────────
  async function syncNow() {
    const btn = document.getElementById('syncBtn');
    const ts  = document.getElementById('syncTimestamp');
    btn.disabled = true;
    btn.textContent = 'Syncing...';
    ts.textContent = '';

    try {
      const r = await fetch(`${API}/api/sync`, { method: 'POST' });
      if (!r.ok) {
        let detail = '';
        try { const j = await r.json(); detail = j.detail || ''; } catch(e) {}
        throw new Error(detail || 'status ' + r.status);
      }
      const syncResult = await r.json();
      // Warn if git pull had conflicts or non-standard output
      if (syncResult.detail && syncResult.detail.toLowerCase().includes('conflict')) {
        showToast('Sync conflict — check journal manually', 4000);
        ts.textContent = 'sync warning';
        btn.disabled = false;
        btn.textContent = 'Sync';
        return;
      }
      await loadAll();
      const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
      ts.textContent = 'last synced ' + now;
    } catch (e) {
      ts.textContent = 'sync failed';
      showToast('Sync failed: ' + e.message, 4000);
      console.error(e);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sync';
    }
  }

  // ── Load all endpoints ────────────────────────────────────────────────────
  function currentMonth() {
    const now = new Date();
    return now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
  }

  async function loadAll() {
    await Promise.all([
      loadEndpoint('balance'),
      loadEndpoint('is'),
      loadEndpoint('monthly'),
      loadEndpoint('transactions', { month: currentMonth() }),
    ]);

    // Persist to localStorage
    saveCache();
    // Refresh autocomplete caches
    fetchAccounts();
    fetchDescriptions();

    // Render summary cards from balance data
    if (cache['balance']) renderSummaryCards(cache['balance']);

    // Render whichever view is currently active
    const active = document.querySelector('.view.active');
    if (active) {
      const name = active.id.replace('view-', '');
      if (cache[name]) renderView(name, cache[name]);
    }
  }

  async function loadEndpoint(name, params) {
    try {
      const qs = params ? '?' + new URLSearchParams(params).toString() : '';
      const r = await fetch(`${API}/api/${name}${qs}`);
      if (!r.ok) throw new Error(`${r.status}`);
      const json = await r.json();
      cache[name] = JSON.parse(json.raw);
    } catch (e) {
      cache[name] = { error: e.message };
    }
  }

  // ── Render dispatcher ─────────────────────────────────────────────────────
  function renderView(name, data) {
    const el = document.getElementById('view-' + name);
    if (data.error) {
      el.innerHTML = `<div class="error-msg">Error: ${data.error}</div>`;
      return;
    }
    if (name === 'balance')      renderBalance(el, data);
    if (name === 'is')           renderIS(el, data);
    if (name === 'monthly')      renderMonthly(el, data);
    if (name === 'transactions') renderTransactions(el, data);
  }

  // ── Format helpers ────────────────────────────────────────────────────────
  function fmtAmount(num, commodity) {
    const sym = commodity || '$';
    const abs = Math.abs(num).toFixed(2);
    const formatted = sym + parseFloat(abs).toLocaleString('en-CA', { minimumFractionDigits: 2 });
    return num < 0 ? `-${formatted}` : formatted;
  }

  function amountClass(num) {
    if (num > 0) return 'amount-positive';
    if (num < 0) return 'amount-negative';
    return 'amount-neutral';
  }

  // Extract first amount value from hledger amounts array
  function extractAmount(amounts) {
    if (!amounts || amounts.length === 0) return { val: 0, commodity: '$' };
    const a = amounts[0];
    const val = typeof a.aquantity === 'object'
      ? parseFloat(a.aquantity.decimalMantissa) / Math.pow(10, a.aquantity.decimalPlaces || 0)
      : parseFloat(a.aquantity) || 0;
    return { val, commodity: a.acommodity || '$' };
  }

  // ── Balance renderer ──────────────────────────────────────────────────────
  // Builds a full tree by synthesizing missing parent rows so every
  // intermediate account appears as a header even if it has no direct postings.
  function renderBalance(el, data) {
    const rows = Array.isArray(data) && Array.isArray(data[0]) ? data[0] : null;
    if (!rows || rows.length === 0) {
      el.innerHTML = '<div class="state-msg">No data.</div>';
      return;
    }

    // Build map of fullName -> amount from real data
    const amountMap = {};
    rows.forEach(row => {
      amountMap[row[0]] = row[3];
    });

    // Collect every account name that should exist (real + synthetic parents)
    const allNames = new Set();
    rows.forEach(row => {
      const parts = row[0].split(':');
      for (let i = 1; i <= parts.length; i++) {
        allNames.add(parts.slice(0, i).join(':'));
      }
    });

    // Sort alphabetically so parents always come before children
    const sorted = Array.from(allNames).sort();

    // Group by top-level
    const groups = {};
    const groupOrder = [];
    sorted.forEach(name => {
      const top = name.split(':')[0];
      if (!groups[top]) { groups[top] = []; groupOrder.push(top); }
      if (name !== top) groups[top].push(name);
    });

    let html = '';
    groupOrder.forEach(group => {
      html += '<div class="section-title">' + group + '</div>';
      groups[group].forEach(fullName => {
        const depth = (fullName.match(/:/g) || []).length;
        const amounts = amountMap[fullName] || [];
        const { val, commodity } = extractAmount(amounts);
        const label = fullName.split(':').pop();
        const indentPx = (depth - 1) * 16;
        // Check if this account has children
        const hasChildren = sorted.some(n => n !== fullName && n.startsWith(fullName + ':'));
        html += '<div class="account-row">'
          + '<span class="account-name" style="padding-left:' + indentPx + 'px;'
          + (hasChildren ? 'font-weight:500;color:var(--accent);' : '') + '">' + label + '</span>'
          + '<span class="account-amount ' + amountClass(val) + '">'
          + (amounts.length > 0 ? fmtAmount(val, commodity) : '') + '</span>'
          + '</div>';
      });
      html += '<br>';
    });
    html += '<div class="view-footer">Data shown via <code>hledger balance</code>. Run this command in your terminal to verify.</div>';
    el.innerHTML = html;
  }

    // ── Income Statement renderer ──────────────────────────────────────────────
  // Builds synthetic parent rows same as balance.
  // JSON: { cbrSubreports: [ ["Revenues", { prRows: [{prrName, prrAmounts[[amts]]}] }], ... ] }
  function renderIS(el, data) {
    if (!data || !data.cbrSubreports) {
      el.innerHTML = '<div class="state-msg">No data.</div>';
      return;
    }
    let html = '';
    let netVal = 0;
    let netCommodity = '$';

    data.cbrSubreports.forEach(subreport => {
      const sectionLabel = subreport[0];
      const prRows = subreport[1] && subreport[1].prRows ? subreport[1].prRows : [];
      if (prRows.length === 0) return;

      // Build amount map and full name set for synthetic tree
      const amountMap = {};
      prRows.forEach(row => { amountMap[row.prrName] = row.prrAmounts && row.prrAmounts[0] ? row.prrAmounts[0] : []; });

      const allNames = new Set();
      prRows.forEach(row => {
        const parts = row.prrName.split(':');
        for (let i = 1; i <= parts.length; i++) allNames.add(parts.slice(0, i).join(':'));
      });
      const sorted = Array.from(allNames).sort();

      // Group by top level
      const groups = {};
      const groupOrder = [];
      sorted.forEach(name => {
        const top = name.split(':')[0];
        if (!groups[top]) { groups[top] = []; groupOrder.push(top); }
        if (name !== top) groups[top].push(name);
      });

      html += '<div class="section-title">' + sectionLabel + '</div>';
      let sectionTotal = 0;

      groupOrder.forEach(group => {
        html += '<div class="account-row" style="padding:6px 0 2px">'
          + '<span class="account-name" style="font-weight:600;font-size:12px;color:var(--accent)">' + group + '</span>'
          + '</div>';
        groups[group].forEach(fullName => {
          const depth = (fullName.match(/:/g) || []).length;
          const amounts = amountMap[fullName] || [];
          const { val, commodity } = extractAmount(amounts);
          netCommodity = commodity || netCommodity;
          if (amounts.length > 0) sectionTotal += val;
          const label = fullName.split(':').pop();
          const indentPx = (depth - 1) * 16;
          const hasChildren = sorted.some(n => n !== fullName && n.startsWith(fullName + ':'));
          html += '<div class="account-row">'
            + '<span class="account-name" style="padding-left:' + indentPx + 'px;'
            + (hasChildren ? 'font-weight:500;color:var(--accent);' : '') + '">' + label + '</span>'
            + '<span class="account-amount ' + amountClass(val) + '">'
            + (amounts.length > 0 ? fmtAmount(val, commodity) : '') + '</span>'
            + '</div>';
        });
      });

      netVal += sectionTotal;
      html += '<div class="account-row" style="border-top:1px solid var(--border);margin-top:4px">'
        + '<span class="account-name" style="font-weight:500">Total ' + sectionLabel + '</span>'
        + '<span class="account-amount ' + amountClass(sectionTotal) + '" style="font-weight:500">' + fmtAmount(sectionTotal, netCommodity) + '</span>'
        + '</div><br>';
    });

    html += '<div class="view-footer">Data shown via <code>hledger is</code>. Run this command in your terminal to verify.</div>';
    el.innerHTML = html || '<div class="state-msg">No data.</div>';
  }

    // ── Monthly renderer ──────────────────────────────────────────────────────
  // Shows one month at a time via dropdown. Parses all periods from JSON
  // but only renders the selected one as a flat account list.
  function renderMonthly(el, data) {
    if (!data || !data.prRows || data.prRows.length === 0) {
      el.innerHTML = '<div class="state-msg">No data.</div>';
      return;
    }
    const dates = data.prDates || [];
    const periodLabels = dates.map(d => {
      const start = d[0] && d[0].contents ? d[0].contents : '';
      if (!start) return '—';
      const dt = new Date(start + 'T00:00:00');
      return dt.toLocaleDateString('en-CA', { month: 'long', year: 'numeric' });
    });

    // Default to most recent period (last index)
    const lastIdx = dates.length - 1;

    const options = periodLabels.map((label, i) =>
      '<option value="' + i + '"' + (i === lastIdx ? ' selected' : '') + '>' + label + '</option>'
    ).reverse().join('');

    function buildMonthTable(periodIdx) {
      // Build amount map for this period
      const amountMap = {};
      data.prRows.forEach(row => {
        const amts = row.prrAmounts && row.prrAmounts[periodIdx] ? row.prrAmounts[periodIdx] : [];
        if (amts && amts.length > 0) {
          const { val } = extractAmount(amts);
          if (val !== 0) amountMap[row.prrName] = amts;
        }
      });

      if (Object.keys(amountMap).length === 0) return '<div class="state-msg">No activity this month.</div>';

      // Synthesize parent rows same as balance view
      const allNames = new Set();
      Object.keys(amountMap).forEach(name => {
        const parts = name.split(':');
        for (let i = 1; i <= parts.length; i++) allNames.add(parts.slice(0, i).join(':'));
      });
      const sorted = Array.from(allNames).sort();

      // Group by top level
      const groups = {};
      const groupOrder = [];
      sorted.forEach(name => {
        const top = name.split(':')[0];
        if (!groups[top]) { groups[top] = []; groupOrder.push(top); }
        if (name !== top) groups[top].push(name);
      });

      let html = '';
      groupOrder.forEach(group => {
        html += '<div class="section-title">' + group + '</div>';
        groups[group].forEach(fullName => {
          const depth = (fullName.match(/:/g) || []).length;
          const amounts = amountMap[fullName] || [];
          const { val, commodity } = extractAmount(amounts);
          const label = fullName.split(':').pop();
          const indentPx = (depth - 1) * 16;
          const hasChildren = sorted.some(n => n !== fullName && n.startsWith(fullName + ':'));
          html += '<div class="account-row">'
            + '<span class="account-name" style="padding-left:' + indentPx + 'px;'
            + (hasChildren ? 'font-weight:500;color:var(--accent);' : '') + '">' + label + '</span>'
            + '<span class="account-amount ' + amountClass(val) + '">'
            + (amounts.length > 0 ? fmtAmount(val, commodity) : '') + '</span>'
            + '</div>';
        });
        html += '<br>';
      });
      return html;
    }

    el.innerHTML = '<div class="month-select-row">'
      + '<select class="month-select" id="monthlySelect" onchange="onMonthlyChange(this.value)">'
      + options + '</select></div>'
      + '<div id="monthlyList">' + buildMonthTable(lastIdx) + '</div>'
      + '<div class="view-footer">Data shown via <code>hledger balance --monthly</code>. Run this command in your terminal to verify.</div>';

    el._monthlyData = data;
  }

  function onMonthlyChange(idxStr) {
    const el = document.getElementById('view-monthly');
    const data = el._monthlyData;
    if (!data) return;
    const idx = parseInt(idxStr);
    const list = document.getElementById('monthlyList');
    if (!list) return;

    // Reuse buildMonthTable via re-render trick — rebuild inline same logic
    const amountMap = {};
    data.prRows.forEach(row => {
      const amts = row.prrAmounts && row.prrAmounts[idx] ? row.prrAmounts[idx] : [];
      if (amts && amts.length > 0) {
        const { val } = extractAmount(amts);
        if (val !== 0) amountMap[row.prrName] = amts;
      }
    });

    if (Object.keys(amountMap).length === 0) {
      list.innerHTML = '<div class="state-msg">No activity this month.</div>';
      return;
    }

    const allNames = new Set();
    Object.keys(amountMap).forEach(name => {
      const parts = name.split(':');
      for (let i = 1; i <= parts.length; i++) allNames.add(parts.slice(0, i).join(':'));
    });
    const sorted = Array.from(allNames).sort();
    const groups = {};
    const groupOrder = [];
    sorted.forEach(name => {
      const top = name.split(':')[0];
      if (!groups[top]) { groups[top] = []; groupOrder.push(top); }
      if (name !== top) groups[top].push(name);
    });

    let html = '';
    groupOrder.forEach(group => {
      html += '<div class="section-title">' + group + '</div>';
      groups[group].forEach(fullName => {
        const depth = (fullName.match(/:/g) || []).length;
        const amounts = amountMap[fullName] || [];
        const { val, commodity } = extractAmount(amounts);
        const label = fullName.split(':').pop();
        const indentPx = (depth - 1) * 16;
        const hasChildren = sorted.some(n => n !== fullName && n.startsWith(fullName + ':'));
        html += '<div class="account-row">'
          + '<span class="account-name" style="padding-left:' + indentPx + 'px;'
          + (hasChildren ? 'font-weight:500;color:var(--accent);' : '') + '">' + label + '</span>'
          + '<span class="account-amount ' + amountClass(val) + '">'
          + (amounts.length > 0 ? fmtAmount(val, commodity) : '') + '</span>'
          + '</div>';
      });
      html += '<br>';
    });
    list.innerHTML = html;
  }

    // ── Transactions renderer ──────────────────────────────────────────────────
  function renderTransactions(el, data) {
    if (!Array.isArray(data) || data.length === 0) {
      el.innerHTML = '<div class="state-msg">No transactions.</div>';
      return;
    }

    // Build month list from journal start (2026-01) to current month
    const now = new Date();
    const startYear = 2026, startMonth = 1;
    const endYear = now.getFullYear(), endMonth = now.getMonth() + 1;
    const monthKeys = [];
    for (let y = endYear; y >= startYear; y--) {
      const mStart = (y === endYear) ? endMonth : 12;
      const mEnd   = (y === startYear) ? startMonth : 1;
      for (let m = mStart; m >= mEnd; m--) {
        monthKeys.push(y + '-' + String(m).padStart(2, '0'));
      }
    }
    const latestMonth = currentMonth();
    const months = {};
    monthKeys.forEach(k => {
      const dt = new Date(k + '-01T00:00:00');
      months[k] = dt.toLocaleDateString('en-CA', { month: 'long', year: 'numeric' });
    });
    const options = monthKeys.map(k =>
      '<option value="' + k + '"' + (k === latestMonth ? ' selected' : '') + '>' + months[k] + '</option>'
    ).join('');

    function buildList(filterMonth) {
      const filtered = data.filter(txn => (txn.tdate || '').startsWith(filterMonth));
      if (filtered.length === 0) return '<div class="state-msg">No transactions this month.</div>';
      return filtered.map(txn => {
        const desc = txn.tdescription || txn.tpayee || '—';
        const date = txn.tdate || '';
        const postings = txn.tpostings || [];
        let amountHtml = '';
        if (postings.length > 0) {
          const { val, commodity } = extractAmount(postings[0].pamount);
          amountHtml = '<span class="txn-amount ' + amountClass(val) + '">' + fmtAmount(val, commodity) + '</span>';
        }
        const postingLines = postings.map(p => '<span style="margin-right:10px">' + (p.paccount || '') + '</span>').join('');
        return '<div class="txn">'
          + '<div class="txn-top"><span class="txn-desc">' + desc + '</span>' + amountHtml + '</div>'
          + '<div class="txn-meta">' + date + ' &nbsp;&middot;&nbsp; ' + postingLines + '</div>'
          + '</div>';
      }).join('');
    }

    el.innerHTML = '<div class="month-select-row">'
      + '<select class="month-select" id="monthSelect" onchange="onMonthChange(this.value)">'
      + options + '</select></div>'
      + '<div id="txnList">' + buildList(latestMonth) + '</div>'
      + '<div class="view-footer">Data shown via <code>hledger print -p YYYY-MM</code>. Run this command in your terminal to verify.</div>';

    // Store data for onMonthChange
    el._txnData = data;
  }

  async function onMonthChange(monthKey) {
    const list = document.getElementById('txnList');
    if (!list) return;
    list.innerHTML = '<div class="state-msg">Loading...</div>';
    try {
      const r = await fetch(`${API}/api/transactions?month=${monthKey}`);
      if (!r.ok) throw new Error(r.status);
      const json = await r.json();
      const data = JSON.parse(json.raw);
      cache['transactions'] = data;
      if (data.length === 0) {
        list.innerHTML = '<div class="state-msg">No transactions this month.</div>';
        return;
      }
      list.innerHTML = data.map(txn => {
        const desc = txn.tdescription || txn.tpayee || '—';
        const date = txn.tdate || '';
        const postings = txn.tpostings || [];
        let amountHtml = '';
        if (postings.length > 0) {
          const { val, commodity } = extractAmount(postings[0].pamount);
          amountHtml = '<span class="txn-amount ' + amountClass(val) + '">' + fmtAmount(val, commodity) + '</span>';
        }
        const postingLines = postings.map(p => '<span style="margin-right:10px">' + (p.paccount || '') + '</span>').join('');
        return '<div class="txn">'
          + '<div class="txn-top"><span class="txn-desc">' + desc + '</span>' + amountHtml + '</div>'
          + '<div class="txn-meta">' + date + ' &nbsp;&middot;&nbsp; ' + postingLines + '</div>'
          + '</div>';
      }).join('');
    } catch (e) {
      list.innerHTML = '<div class="error-msg">Failed to load: ' + e.message + '</div>';
    }
  }

  // ── Summary cards (assets / liabilities / net worth) ─────────────────────
  function renderSummaryCards(balanceData) {
    const el = document.getElementById('summaryCards');
    if (!el) return;
    const rows = Array.isArray(balanceData) && Array.isArray(balanceData[0]) ? balanceData[0] : [];

    let assets = 0, liabilities = 0, commodity = '$';
    rows.forEach(row => {
      const name = row[0];
      const amounts = row[3];
      const { val, commodity: com } = extractAmount(amounts);
      commodity = com || commodity;
      if (name.startsWith('assets')) assets += val;
      if (name.startsWith('liabilities')) liabilities += val;
    });
    const net = assets + liabilities;

    el.innerHTML = '<div class="summary-card">'
        + '<div class="card-label">Assets</div>'
        + '<div class="card-value amount-positive">' + fmtAmount(assets, commodity) + '</div>'
        + '</div>'
      + '<div class="summary-card">'
        + '<div class="card-label">Liabilities</div>'
        + '<div class="card-value amount-negative">' + fmtAmount(Math.abs(liabilities), commodity) + '</div>'
        + '</div>'
      + '<div class="summary-card">'
        + '<div class="card-label">Net Worth</div>'
        + '<div class="card-value ' + amountClass(net) + '">' + fmtAmount(net, commodity) + '</div>'
        + '</div>';
  }

  // ── Add Transaction ────────────────────────────────────────────────────────

  const STEPS = ['date', 'description', 'account1', 'amount1', 'account2', 'amount2', 'preview'];
  const STEP_TITLES = {
    date: 'Date',
    description: 'Description',
    account1: 'Account 1',
    amount1: 'Amount',
    account2: 'Account 2',
    amount2: 'Amount 2',
    preview: 'Preview'
  };

  let addState = {};
  let addStepIdx = 0;
  let accountsList = [];
  let descriptionsList = [];

  async function fetchDescriptions() {
    try {
      const cached = localStorage.getItem('hledger_descriptions');
      if (cached) descriptionsList = JSON.parse(cached);
    } catch(e) {}
    try {
      const r = await fetch(`${API}/api/descriptions`);
      if (!r.ok) return;
      const json = await r.json();
      descriptionsList = json.descriptions || [];
      localStorage.setItem('hledger_descriptions', JSON.stringify(descriptionsList));
    } catch(e) {}
  }

  async function lookupDescription(desc) {
    try {
      const r = await fetch(`${API}/api/lookup?description=` + encodeURIComponent(desc));
      if (!r.ok) return null;
      const json = await r.json();
      return json.match || null;
    } catch(e) { return null; }
  }

  function showToast(msg, duration) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration || 2500);
  }

  function openAdd() {
    addState = {};
    addStepIdx = 0;
    document.getElementById('addSheet').style.display = 'flex';
    document.body.style.overflow = 'hidden';
    if (accountsList.length === 0) fetchAccounts();
    if (descriptionsList.length === 0) fetchDescriptions();
    renderAddStep();
  }

  function closeAdd() {
    document.getElementById('addSheet').style.display = 'none';
    document.body.style.overflow = '';
  }

  function addBack() {
    if (addStepIdx === 0) { closeAdd(); return; }
    addStepIdx--;
    renderAddStep();
  }

  async function fetchAccounts() {
    // Restore from localStorage first for instant availability
    try {
      const cached = localStorage.getItem('hledger_accounts');
      if (cached) accountsList = JSON.parse(cached);
    } catch(e) {}
    try {
      const r = await fetch(`${API}/api/accounts`);
      if (!r.ok) return;
      const json = await r.json();
      accountsList = json.accounts || [];
      localStorage.setItem('hledger_accounts', JSON.stringify(accountsList));
    } catch(e) {}
  }

  function setProgress() {
    const pct = ((addStepIdx + 1) / STEPS.length) * 100;
    document.getElementById('addProgressBar').style.width = pct + '%';
    document.getElementById('addTitle').textContent = STEP_TITLES[STEPS[addStepIdx]];
    document.getElementById('addBackBtn').style.visibility = addStepIdx === 0 ? 'hidden' : 'visible';
  }

  function renderAddStep() {
    setProgress();
    const step = STEPS[addStepIdx];
    const body = document.getElementById('addBody');

    if (step === 'date') {
      const today = new Date();
      const yesterday = new Date(today);
      yesterday.setDate(today.getDate() - 1);
      const fmt = d => d.toISOString().slice(0, 10);
      const fmtLabel = d => d.toLocaleDateString('en-CA', { weekday: 'long', month: 'long', day: 'numeric' });

      body.innerHTML = '<div class="step-label">Select a date</div>'
        + '<div class="step-options">'
        + '<button class="step-option' + (addState.date === fmt(today) || !addState.date ? ' selected' : '') + '" onclick="selectDate(\'' + fmt(today) + '\', this)">Today &nbsp;<span style="color:var(--text-muted);font-size:12px">' + fmtLabel(today) + '</span></button>'
        + '<button class="step-option' + (addState.date === fmt(yesterday) ? ' selected' : '') + '" onclick="selectDate(\'' + fmt(yesterday) + '\', this)">Yesterday &nbsp;<span style="color:var(--text-muted);font-size:12px">' + fmtLabel(yesterday) + '</span></button>'
        + '<button class="step-option" id="customDateOption" onclick="showDatePicker()">Pick a date&hellip;</button>'
        + '</div>'
        + '<input type="date" id="customDateInput" class="step-input" style="display:none" onchange="selectDate(this.value, null, true)">'
        + '<button class="step-next" onclick="advanceStep()">Continue</button>';

      if (!addState.date) addState.date = fmt(today);
    }

    else if (step === 'description') {
      body.innerHTML = '<div class="step-label">What was this for?</div>'
        + '<div class="autocomplete-wrap">'
        + '<input type="text" id="descInput" class="step-input" placeholder="e.g. Groceries, Rent, Salary" value="' + (addState.description || '') + '">'
        + '<div class="autocomplete-list" id="descList" style="display:none"></div>'
        + '</div>'
        + '<button class="step-next" id="descNext"' + (addState.description ? '' : ' disabled') + '>Continue</button>';
      setTimeout(() => {
        const inp = document.getElementById('descInput');
        const nextBtn = document.getElementById('descNext');
        const list = document.getElementById('descList');
        if (!inp) return;
        inp.focus();
        if (addState.description) inp.select();

        function showDescSuggestions(val) {
          addState.description = val;
          if (nextBtn) nextBtn.disabled = !val.trim();
          if (!val.trim() || descriptionsList.length === 0) { list.style.display = 'none'; return; }
          const q = val.toLowerCase();
          const matches = descriptionsList.filter(d => d.toLowerCase().includes(q)).slice(0, 8);
          if (!matches.length) { list.style.display = 'none'; return; }
          list.innerHTML = matches.map(d => '<div class="autocomplete-item">' + d + '</div>').join('');
          list.style.display = 'block';
          list.querySelectorAll('.autocomplete-item').forEach((item, i) => {
            item.addEventListener('click', () => {
              inp.value = matches[i];
              addState.description = matches[i];
              list.style.display = 'none';
              if (nextBtn) nextBtn.disabled = false;
            });
          });
        }

        inp.addEventListener('input', () => showDescSuggestions(inp.value));
        inp.addEventListener('keydown', e => {
          const items = Array.from(list.querySelectorAll('.autocomplete-item'));
          const highlighted = list.querySelector('.highlighted');
          const idx = highlighted ? items.indexOf(highlighted) : -1;
          if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (!items.length) return;
            if (highlighted) highlighted.classList.remove('highlighted');
            items[Math.min(idx + 1, items.length - 1)].classList.add('highlighted');
          } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (highlighted) highlighted.classList.remove('highlighted');
            if (idx > 0) items[idx - 1].classList.add('highlighted');
          } else if (e.key === 'Enter') {
            if (highlighted) { e.preventDefault(); highlighted.click(); }
            else if (inp.value.trim()) { list.style.display = 'none'; advanceDescStep(); }
          }
        });
        if (nextBtn) nextBtn.addEventListener('click', advanceDescStep);

        async function advanceDescStep() {
          addState.description = inp.value.trim();
          if (!addState.description) return;
          nextBtn.disabled = true;
          nextBtn.textContent = 'Looking up...';
          const match = await lookupDescription(addState.description);
          addState._predicted = match || null;
          addState._amount2edited = false;  // reset on new description
          addStepIdx++;
          renderAddStep();
        }

        // Don't auto-show dropdown on load — only on user input
      }, 50);
    }

    else if (step === 'account1' || step === 'account2') {
      const which = step === 'account1' ? 1 : 2;
      const stateKey = step;
      // Pre-fill from prediction if not already set
      if (!addState[stateKey] && addState._predicted && addState._predicted[stateKey]) {
        addState[stateKey] = addState._predicted[stateKey];
      }
      const current = addState[stateKey] || '';
      body.innerHTML = '<div class="step-label">Account ' + which + '</div>'
        + '<div class="autocomplete-wrap">'
        + '<input type="text" id="acctInput" class="step-input" placeholder="e.g. expenses:food:groceries" value="' + current + '" autocomplete="off" autocorrect="off" spellcheck="false" style="padding-right:' + (current ? '36px' : '16px') + '">'
        + (current ? '<button class="input-clear-btn" id="acctClearBtn" title="Clear">&#x2715;</button>' : '')
        + '<div class="autocomplete-list" id="acctList" style="display:none"></div>'
        + '</div>'
        + '<button class="step-next" id="acctNext"' + (current ? '' : ' disabled') + '>Continue</button>';
      setTimeout(() => {
        const inp = document.getElementById('acctInput');
        const nextBtn = document.getElementById('acctNext');
        const sk = stateKey;
        const clearBtn = document.getElementById('acctClearBtn');
        if (clearBtn) {
          clearBtn.addEventListener('click', () => {
            inp.value = '';
            addState[sk] = '';
            clearBtn.style.display = 'none';
            inp.style.paddingRight = '16px';
            const nextBtn2 = document.getElementById('acctNext');
            if (nextBtn2) nextBtn2.disabled = true;
            inp.focus();
            onAcctInput('', sk);
          });
        }
        if (inp) {
          inp.addEventListener('input', () => onAcctInput(inp.value, sk));
          inp.addEventListener('keydown', e => {
            const list = document.getElementById('acctList');
            const items = list ? Array.from(list.querySelectorAll('.autocomplete-item')) : [];
            const highlighted = list ? list.querySelector('.highlighted') : null;
            const idx = highlighted ? items.indexOf(highlighted) : -1;
            if (e.key === 'ArrowDown') {
              e.preventDefault();
              if (!items.length) return;
              if (highlighted) highlighted.classList.remove('highlighted');
              items[Math.min(idx + 1, items.length - 1)].classList.add('highlighted');
            } else if (e.key === 'ArrowUp') {
              e.preventDefault();
              if (highlighted) highlighted.classList.remove('highlighted');
              if (idx > 0) items[idx - 1].classList.add('highlighted');
            } else if (e.key === 'Enter' || e.key === 'Tab') {
              if (highlighted) {
                e.preventDefault();
                highlighted.click();
              } else if (e.key === 'Enter' && inp.value.trim()) {
                e.preventDefault();
                advanceFromAccount(sk);
              }
            }
          });
          inp.focus();
          // Don't auto-show dropdown on load — only on user input
        }
        if (nextBtn) nextBtn.addEventListener('click', () => advanceFromAccount(sk));
      }, 50);
    }

    else if (step === 'amount1' || step === 'amount2') {
      const stateKey = step;
      // Pre-fill from prediction if not already set
      if (addState[stateKey] === undefined && addState._predicted && addState._predicted[stateKey] !== undefined) {
        addState[stateKey] = addState._predicted[stateKey];
      }
      // For amount2: always default to inverse of current amount1 (even if predicted),
      // unless the user has already explicitly edited amount2 on this session.
      const defaultVal = step === 'amount2'
        ? (addState._amount2edited ? addState.amount2 : (addState.amount1 !== undefined ? -addState.amount1 : ''))
        : (addState.amount1 !== undefined ? addState.amount1 : '');
      body.innerHTML = '<div class="step-label">' + (step === 'amount1' ? 'How much?' : 'Offsetting amount') + '</div>'
        + '<input type="number" id="amtInput" class="step-input" placeholder="0.00" step="0.01" value="' + defaultVal + '" oninput="addState.' + stateKey + '=parseFloat(this.value)" onkeydown="if(event.key===\'Enter\')advanceStep()">'
        + (step === 'amount2' ? '<div style="font-size:11px;color:var(--text-muted);margin-bottom:12px">Defaults to inverse of amount 1. Edit if needed.</div>' : '')
        + '<button class="step-next" onclick="advanceStep()">Continue</button>';
      setTimeout(() => {
        const inp = document.getElementById('amtInput');
        const sk = stateKey;
        if (!inp) return;
        inp.focus(); inp.select();
        inp.addEventListener('input', () => {
          addState[sk] = parseFloat(inp.value);
          if (sk === 'amount2') addState._amount2edited = true;
        });
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') advanceStep(); });
      }, 50);
    }

    else if (step === 'preview') {
      const { date, description, account1, amount1, account2, amount2 } = addState;
      const a2 = amount2 !== undefined ? amount2 : -amount1;
      const currency = '$';
      const fmt = n => currency + Math.abs(n).toFixed(2);
      const sign = n => n < 0 ? '-' : '';

      const entryText = date + ' ' + description + '\n'
        + '    ' + account1 + '    ' + sign(amount1) + fmt(amount1) + '\n'
        + '    ' + account2 + '    ' + sign(a2) + fmt(a2);

      body.innerHTML = '<div class="step-label">Review entry</div>'
        + '<div class="preview-entry">' + entryText + '</div>'
        + '<div class="preview-row"><span>Date</span><span>' + date + '</span></div>'
        + '<div class="preview-row"><span>Description</span><span>' + description + '</span></div>'
        + '<div class="preview-row"><span>Account 1</span><span>' + account1 + '</span></div>'
        + '<div class="preview-row"><span>Amount 1</span><span>' + sign(amount1) + fmt(amount1) + '</span></div>'
        + '<div class="preview-row"><span>Account 2</span><span>' + account2 + '</span></div>'
        + '<div class="preview-row"><span>Amount 2</span><span>' + sign(a2) + fmt(a2) + '</span></div>'
        + '<button class="confirm-btn" id="confirmBtn" onclick="submitAdd()">Confirm &amp; Save</button>'
        + '<button class="cancel-btn" onclick="addBack()">Go back &amp; edit</button>';
    }
  }

  function selectDate(val, btn, fromPicker) {
    addState.date = val;
    document.querySelectorAll('.step-option').forEach(b => b.classList.remove('selected'));
    if (btn) btn.classList.add('selected');
    if (fromPicker) {
      const opt = document.getElementById('customDateOption');
      if (opt) { opt.classList.add('selected'); opt.textContent = val; }
    }
  }

  function showDatePicker() {
    const inp = document.getElementById('customDateInput');
    if (!inp) return;
    inp.style.display = 'block';
    inp.value = addState.date || new Date().toISOString().slice(0, 10);
    inp.focus();
  }

  function onAcctInput(val, stateKey) {
    addState[stateKey] = val;
    const list = document.getElementById('acctList');
    const nextBtn = document.getElementById('acctNext');
    if (nextBtn) nextBtn.disabled = !val.trim();
    if (!val.trim() || accountsList.length === 0) { if (list) list.style.display = 'none'; return; }

    const q = val.toLowerCase();
    const matches = accountsList.filter(a => a.toLowerCase().includes(q)).slice(0, 8);

    if (matches.length === 0) { list.style.display = 'none'; return; }

    list.innerHTML = matches.map(a => '<div class="autocomplete-item">' + a + '</div>').join('');
    list.style.display = 'block';
    list.querySelectorAll('.autocomplete-item').forEach((item, i) => {
      item.addEventListener('click', () => selectAccount(matches[i], stateKey));
    });
  }

  function selectAccount(val, stateKey) {
    addState[stateKey] = val;
    const inp = document.getElementById('acctInput');
    const list = document.getElementById('acctList');
    const nextBtn = document.getElementById('acctNext');
    if (inp) inp.value = val;
    if (list) list.style.display = 'none';
    if (nextBtn) nextBtn.disabled = false;
  }

  function advanceFromAccount(stateKey) {
    const inp = document.getElementById('acctInput');
    if (inp) addState[stateKey] = inp.value.trim();
    if (!addState[stateKey]) return;
    addStepIdx++;
    renderAddStep();
  }

  function advanceStep() {
    const step = STEPS[addStepIdx];
    // Validate
    if (step === 'description') {
      const inp = document.getElementById('descInput');
      if (inp) addState.description = inp.value.trim();
      if (!addState.description) return;
    }
    if (step === 'amount1' || step === 'amount2') {
      const inp = document.getElementById('amtInput');
      if (inp) addState[step] = parseFloat(inp.value);
      if (isNaN(addState[step])) return;
    }
    addStepIdx++;
    renderAddStep();
  }

  async function submitAdd() {
    const btn = document.getElementById('confirmBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }

    const a2 = addState.amount2 !== undefined ? addState.amount2 : -addState.amount1;

    try {
      const r = await fetch(`${API}/api/add`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          date: addState.date,
          description: addState.description,
          account1: addState.account1,
          amount1: addState.amount1,
          account2: addState.account2,
          amount2: a2,
          currency: '$'
        })
      });
      if (!r.ok) {
        const err = await r.json();
        throw new Error(err.detail || r.status);
      }
      closeAdd();
      showToast('Saved — syncing...');
      await syncNow();
      showToast('Synced');
    } catch(e) {
      if (btn) { btn.disabled = false; btn.textContent = 'Confirm & Save'; }
      document.getElementById('addBody').insertAdjacentHTML('afterbegin',
        '<div class="error-msg">Failed to save: ' + e.message + '</div>');
    }
  }

  // ── Offline detection ───────────────────────────────────────────────────────
  function updateOnlineStatus() {
    const banner = document.getElementById('offlineBanner');
    if (!banner) return;
    if (!navigator.onLine) {
      banner.classList.add('visible');
      document.body.classList.add('is-offline');
    } else {
      banner.classList.remove('visible');
      document.body.classList.remove('is-offline');
    }
  }

  window.addEventListener('online', updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);
  updateOnlineStatus(); // check on load

  // ── Service Worker registration (PWA) ────────────────────────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }

</script>
</body>
</html>
