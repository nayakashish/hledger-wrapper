<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>hledger</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#2e2e2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="hledger" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f6f3; --surface: #ffffff; --border: #e8e6e1;
      --text: #2e2e2e; --text-muted: #9b9793; --accent: #37352f;
      --positive: #2d6a4f; --negative: #c0392b; --radius: 6px; --max-w: 520px;
    }
    body { font-family: 'Montserrat', sans-serif; background: var(--bg); color: var(--text);
      min-height: 100vh; font-size: 14px; font-weight: 400; overflow-x: hidden; overflow-y: auto;
      touch-action: manipulation; }
    *, *::before, *::after { scrollbar-width: none; -ms-overflow-style: none; }
    *::-webkit-scrollbar { display: none; }
    button, select, input, textarea, a, [onclick], [role="button"] { touch-action: manipulation; }
    .app { max-width: var(--max-w); margin: 0 auto;
      padding: 0 0 calc(80px + env(safe-area-inset-bottom, 0px)); overflow-x: hidden; }
    header { padding: calc(28px + env(safe-area-inset-top, 0px)) 20px 0;
      display: flex; align-items: baseline; justify-content: space-between; }
    header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; color: var(--accent);
      user-select: none; -webkit-user-select: none; cursor: default;
      -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    header h1 span { font-weight: 600; color: var(--accent); }
    .sync-row { display: flex; align-items: center; gap: 8px; padding: 16px 20px 20px;
      border-bottom: 1px solid var(--border); }
    .sync-btn { font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 500;
      letter-spacing: 0.4px; text-transform: uppercase; background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); padding: 7px 14px; cursor: pointer;
      transition: opacity 0.15s; flex-shrink: 0; touch-action: manipulation; }
    .sync-btn:hover { opacity: 0.8; }
    .sync-btn:disabled { opacity: 0.4; cursor: default; }
    .sync-timestamp { font-size: 11px; color: var(--text-muted); font-weight: 300;
      min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    nav { display: flex; gap: 0; padding: 0 20px; border-bottom: 1px solid var(--border); overflow-x: auto; }
    nav button { font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 500;
      letter-spacing: 0.3px; text-transform: uppercase; background: none; border: none;
      border-bottom: 2px solid transparent; color: var(--text-muted); padding: 14px 16px;
      cursor: pointer; white-space: nowrap; transition: color 0.15s, border-color 0.15s;
      touch-action: manipulation; }
    nav button.active { color: var(--accent); border-bottom-color: var(--accent); }
    nav button:hover:not(.active) { color: var(--text); }
    .view { padding: 24px 20px; display: none; overflow-x: hidden; }
    .view.active { display: block; }
    .section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 14px; }
    .account-row { display: flex; justify-content: space-between; align-items: baseline;
      padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; min-width: 0; }
    .account-row:last-child { border-bottom: none; }
    .account-name { color: var(--text); font-weight: 400; min-width: 0; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; flex: 1; margin-right: 8px; }
    .account-amount { font-weight: 500; font-variant-numeric: tabular-nums; font-size: 13px; flex-shrink: 0; }
    .amount-positive { color: var(--positive); }
    .amount-negative { color: var(--negative); }
    .amount-neutral  { color: var(--text); }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px; margin-bottom: 10px; }
    .card-label { font-size: 11px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 6px; }
    .card-value { font-size: 22px; font-weight: 300; letter-spacing: -0.5px; font-variant-numeric: tabular-nums; }
    .txn { padding: 11px 4px; border-bottom: 1px solid var(--border); min-width: 0; overflow: hidden;
      cursor: pointer; border-radius: 4px; -webkit-tap-highlight-color: transparent; }
    .txn:last-child { border-bottom: none; }
    .txn:active { background: #f0efe9; }
    .txn-top { display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 3px; gap: 8px; min-width: 0; }
    .txn-desc { font-size: 13px; font-weight: 500; color: var(--text); min-width: 0;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .txn-amount { font-size: 13px; font-weight: 500; font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .txn-meta { font-size: 11px; color: var(--text-muted); font-weight: 300;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis; width: 100%; }
    .monthly-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .monthly-table th { text-align: left; font-size: 10px; font-weight: 600; letter-spacing: 0.6px;
      text-transform: uppercase; color: var(--text-muted); padding: 0 8px 10px 0;
      border-bottom: 1px solid var(--border); }
    .monthly-table th:last-child { text-align: right; }
    .monthly-table td { padding: 9px 8px 9px 0; border-bottom: 1px solid var(--border);
      font-variant-numeric: tabular-nums; vertical-align: top; }
    .monthly-table td:last-child { text-align: right; }
    .monthly-table tr:last-child td { border-bottom: none; }
    .state-msg { font-size: 13px; color: var(--text-muted); font-weight: 300;
      padding: 40px 0; text-align: center; }
    .error-msg { font-size: 12px; color: var(--negative); padding: 12px; background: #fdf0ef;
      border-radius: var(--radius); margin-bottom: 12px; }
    .summary-cards { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px;
      background: var(--border); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .summary-card { background: var(--surface); padding: 14px 16px; min-width: 0; }
    .summary-card .card-label { font-size: 10px; font-weight: 600; letter-spacing: 0.6px;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 4px; }
    .summary-card .card-value { font-size: 15px; font-weight: 500; font-variant-numeric: tabular-nums;
      letter-spacing: -0.3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .month-select-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .month-select { font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 500;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 6px 10px; color: var(--text); cursor: pointer; flex: 1; min-width: 0;
      touch-action: manipulation; }
    .month-select:focus { outline: none; border-color: var(--accent); }
    /* Search */
    .search-wrap { position: relative; margin-bottom: 14px; }
    .search-input { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 400;
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 9px 36px 9px 12px; color: var(--text);
      outline: none; transition: border-color 0.15s; }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }
    .search-clear { position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted); font-size: 14px; cursor: pointer;
      padding: 4px 6px; border-radius: 4px; display: none; line-height: 1; touch-action: manipulation; }
    .search-clear.visible { display: block; }
    .search-clear:hover { color: var(--accent); }
    .search-count { font-size: 11px; color: var(--text-muted); font-weight: 300;
      margin-bottom: 12px; }
    /* Raw entry in detail sheet */
    .txn-detail-raw { font-family: 'Courier New', monospace; font-size: 11px;
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px; white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere;
      color: var(--accent); line-height: 1.7; overflow-x: hidden; width: 100%;
      box-sizing: border-box; }
    /* Footer */
    .view-footer { margin-top: 32px; padding-top: 12px; border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text-muted); font-weight: 300; line-height: 1.6; }
    .view-footer code { font-family: 'Courier New', monospace; font-size: 10px;
      background: var(--border); padding: 1px 5px; border-radius: 3px; color: var(--accent); }
    /* Banners */
    .demo-banner { display: none; position: fixed; top: 0; left: 0; right: 0; background: #b7791f;
      color: #fff; font-size: 12px; font-weight: 500; text-align: center;
      padding: calc(env(safe-area-inset-top, 0px) + 10px) 16px 10px; z-index: 600;
      letter-spacing: 0.3px; cursor: pointer; transition: opacity 0.15s;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .demo-banner:hover { opacity: 0.9; }
    .demo-banner.visible { display: block; }
    body.is-demo header { padding-top: calc(28px + env(safe-area-inset-top, 0px) + 37px) !important; }
    .offline-banner { display: none; position: fixed; top: 0; left: 0; right: 0; background: #c0392b;
      color: #fff; font-size: 12px; font-weight: 500; text-align: center;
      padding: calc(env(safe-area-inset-top, 0px) + 10px) 16px 10px; z-index: 600; letter-spacing: 0.3px; }
    .offline-banner.visible { display: block; }
    body.is-offline header { padding-top: calc(28px + env(safe-area-inset-top, 0px) + 37px) !important; }
    /* Toast */
    .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--accent); color: #fff; font-size: 13px; font-weight: 500;
      padding: 12px 24px; border-radius: 24px; opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease; z-index: 500;
      white-space: nowrap; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    /* Add sheet */
    .add-sheet { position: fixed; inset: 0; background: var(--bg); z-index: 200;
      display: flex; flex-direction: column; overflow: hidden; }
    .add-sheet-inner { max-width: var(--max-w); width: 100%; margin: 0 auto;
      display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    .add-header { display: flex; align-items: center; justify-content: space-between;
      padding: calc(env(safe-area-inset-top, 0px) + 16px) 20px 12px;
      border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .add-title { font-size: 15px; font-weight: 600; color: var(--accent); letter-spacing: -0.2px; }
    .add-back, .add-close { font-family: 'Montserrat', sans-serif; background: none; border: none;
      font-size: 18px; color: var(--text-muted); cursor: pointer; padding: 4px 8px;
      border-radius: var(--radius); line-height: 1; touch-action: manipulation; }
    .add-back:hover, .add-close:hover { color: var(--accent); }
    .add-progress { height: 2px; background: var(--border); flex-shrink: 0; }
    .add-progress-bar { height: 2px; background: var(--accent); transition: width 0.25s ease; }
    .add-body { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 28px 20px 40px; }
    .step-label { font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 16px; }
    .step-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    .step-option { font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 400;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px 16px; text-align: left; color: var(--text); cursor: pointer;
      transition: border-color 0.15s, background 0.15s; width: 100%;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; touch-action: manipulation; }
    .step-option:hover, .step-option.selected { border-color: var(--accent); background: #f0efe9; }
    .step-input { font-family: 'Montserrat', sans-serif; font-size: 15px; font-weight: 400;
      width: 100%; border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px 16px; background: var(--surface); color: var(--text);
      outline: none; margin-bottom: 8px; }
    .step-input:focus { border-color: var(--accent); }
    .step-next { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600;
      letter-spacing: 0.4px; text-transform: uppercase; background: var(--accent); color: #fff;
      border: none; border-radius: var(--radius); padding: 14px 24px; width: 100%;
      cursor: pointer; margin-top: 8px; transition: opacity 0.15s; touch-action: manipulation; }
    .step-next:hover { opacity: 0.85; }
    .step-next:disabled { opacity: 0.35; cursor: default; }
    .autocomplete-wrap { position: relative; margin-bottom: 8px; }
    .input-clear-btn { position: absolute; right: 10px; top: 0; bottom: 0; margin: auto;
      height: 24px; width: 24px; display: flex; align-items: center; justify-content: center;
      background: none; border: none; font-size: 14px; color: var(--text-muted);
      cursor: pointer; border-radius: 50%; line-height: 1; touch-action: manipulation; }
    .input-clear-btn:hover { color: var(--accent); background: var(--border); }
    .autocomplete-list { position: absolute; top: calc(100% + 2px); left: 0; right: 0;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      max-height: 220px; overflow-y: auto; overflow-x: hidden; z-index: 300;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .autocomplete-item { padding: 12px 16px; font-size: 13px; cursor: pointer;
      border-bottom: 1px solid var(--border); color: var(--text);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; touch-action: manipulation; }
    .autocomplete-item:last-child { border-bottom: none; }
    .autocomplete-item:hover, .autocomplete-item.highlighted { background: #f0efe9; }
    .preview-entry { font-family: 'Courier New', monospace; font-size: 13px;
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px; white-space: pre-wrap; word-break: break-all; overflow-wrap: break-word;
      color: var(--accent); margin-bottom: 16px; line-height: 1.7; width: 100%;
      resize: vertical; outline: none; box-sizing: border-box; overflow-x: hidden; }
    .preview-entry:focus { border-color: var(--accent); }
    .confirm-btn { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600;
      letter-spacing: 0.4px; text-transform: uppercase; background: var(--positive); color: #fff;
      border: none; border-radius: var(--radius); padding: 14px 24px; width: 100%;
      cursor: pointer; margin-bottom: 10px; transition: opacity 0.15s; touch-action: manipulation; }
    .confirm-btn:hover { opacity: 0.85; }
    .confirm-btn:disabled { opacity: 0.35; cursor: default; }
    .cancel-btn { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 500;
      background: none; border: 1px solid var(--border); border-radius: var(--radius);
      padding: 13px 24px; width: 100%; cursor: pointer; color: var(--text-muted);
      touch-action: manipulation; }
    /* Transaction detail bottom sheet */
    .txn-detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 400;
      display: flex; align-items: flex-end; justify-content: center;
      opacity: 0; transition: opacity 0.2s ease; pointer-events: none;
      overscroll-behavior: contain; }
    .txn-detail-overlay.open { opacity: 1; pointer-events: all; }
    .txn-detail-sheet { background: var(--surface); border-radius: 12px 12px 0 0;
      width: 100%; max-width: var(--max-w); max-height: 78vh;
      display: flex; flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1); overflow: hidden;
      will-change: transform; }
    .txn-detail-overlay.open .txn-detail-sheet { transform: translateY(0); }
    .txn-detail-handle { width: 36px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 10px auto 0; flex-shrink: 0; }
    .txn-detail-header { padding: 14px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .txn-detail-desc { font-size: 16px; font-weight: 600; color: var(--accent);
      letter-spacing: -0.3px; margin-bottom: 3px; }
    .txn-detail-date { font-size: 12px; color: var(--text-muted); font-weight: 300; }
    .txn-detail-body { overflow-y: auto; padding: 16px 20px calc(env(safe-area-inset-bottom, 0px) + 24px); }
    .txn-detail-section { margin-bottom: 20px; }
    .txn-detail-section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.8px;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
    .posting-row { display: flex; justify-content: space-between; align-items: flex-start;
      padding: 9px 0; border-bottom: 1px solid var(--border); gap: 8px; min-width: 0; }
    .posting-row:last-child { border-bottom: none; }
    .posting-left { min-width: 0; flex: 1; overflow: hidden; }
    .posting-account { font-size: 12px; font-weight: 400; color: var(--text);
      font-family: 'Courier New', monospace; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; }
    .posting-comment { font-size: 11px; color: var(--text-muted); font-weight: 300;
      margin-top: 2px; font-style: italic; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .posting-amount { font-size: 13px; font-weight: 500; font-variant-numeric: tabular-nums;
      flex-shrink: 0; padding-top: 1px; }
    .txn-detail-comment-box { font-size: 12px; color: var(--text-muted); font-weight: 300;
      font-style: italic; line-height: 1.5; padding: 6px 0; }
    /* Pin modal */
    .pin-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 700;
      display: flex; align-items: center; justify-content: center; padding: 20px; }
    .pin-modal { background: var(--surface); border-radius: 12px; padding: 28px 24px;
      width: 100%; max-width: 300px; text-align: center; }
    .pin-modal-title { font-size: 15px; font-weight: 600; color: var(--accent);
      margin-bottom: 6px; letter-spacing: -0.2px; }
    .pin-modal-sub { font-size: 12px; color: var(--text-muted); font-weight: 300; margin-bottom: 20px; }
    .pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; }
    .pin-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--border);
      background: transparent; transition: background 0.15s, border-color 0.15s; }
    .pin-dot.filled { background: var(--accent); border-color: var(--accent); }
    .pin-dot.error { background: var(--negative); border-color: var(--negative); }
    .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .pin-key { font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 400;
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px 0; cursor: pointer; color: var(--text); transition: background 0.1s;
      text-align: center; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .pin-key:active { background: var(--border); }
    .pin-key.delete { font-size: 14px; color: var(--text-muted); }
    .pin-key.cancel { font-size: 12px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.3px; }
    .pin-error-msg { font-size: 11px; color: var(--negative); margin-bottom: 12px; min-height: 16px; }
    @media (max-width: 540px) {
      nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface);
        border-top: 1px solid var(--border); border-bottom: none; justify-content: space-around;
        padding: 0 0 env(safe-area-inset-bottom, 0px); z-index: 100; }
      nav button { flex: 1; padding: 12px 4px; font-size: 10px; border-bottom: none;
        border-top: 2px solid transparent; }
      nav button.active { border-bottom: none; border-top-color: var(--accent); }
    }
  /* ---- Envelope tab layout ---- */
  .env-section-title {
    font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase;
    color: var(--text-muted); margin: 20px 0 10px;
  }
  .env-action-bar {
    display: flex; gap: 8px; padding: 0 0 16px;
    border-bottom: 1px solid var(--border); margin-bottom: 4px;
  }
  .env-btn {
    font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 600;
    letter-spacing: 0.4px; text-transform: uppercase; border: none;
    border-radius: var(--radius); padding: 9px 14px; cursor: pointer;
    transition: opacity 0.15s; white-space: nowrap; touch-action: manipulation;
  }
  .env-btn:hover { opacity: 0.8; }
  .env-btn:disabled { opacity: 0.35; cursor: default; }
  .env-btn.primary { background: var(--accent); color: #fff; }
  .env-btn.outline { background: none; color: var(--accent); border: 1px solid var(--accent); }
  .env-btn.ghost { background: none; color: var(--text-muted); border: 1px solid var(--border); }

  /* ---- Pending transactions ---- */
  .pending-item {
    padding: 12px 4px; border-bottom: 1px solid var(--border);
    cursor: pointer; border-radius: 4px; -webkit-tap-highlight-color: transparent;
  }
  .pending-item:last-child { border-bottom: none; }
  .pending-item:active { background: #f0efe9; }
  .pending-top {
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 8px; margin-bottom: 3px;
  }
  .pending-desc {
    font-size: 13px; font-weight: 500; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
  }
  .pending-amount { font-size: 13px; font-weight: 500; font-variant-numeric: tabular-nums; flex-shrink: 0; }
  .pending-meta { font-size: 11px; color: var(--text-muted); font-weight: 300; }
  .pending-badge {
    display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
    text-transform: uppercase; border-radius: 3px; padding: 1px 6px; margin-left: 6px;
  }
  .pending-badge.income { background: #e8f5ee; color: var(--positive); }
  .pending-badge.expense { background: #f7f6f3; color: var(--text-muted); }
  .pending-badge.suggested { background: #eef2ff; color: #534ab7; }

  /* ---- Envelope tree ---- */
  .env-parent {
    margin-bottom: 18px;
  }
  .env-parent-header {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 8px 0; border-bottom: 2px solid var(--accent); margin-bottom: 0;
  }
  .env-parent-name { font-size: 13px; font-weight: 600; color: var(--accent); letter-spacing: -0.2px; }
  .env-parent-total { font-size: 14px; font-weight: 500; font-variant-numeric: tabular-nums; }
  .env-unalloc-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 7px 0; border-bottom: 1px dashed var(--border);
    font-size: 12px; color: var(--text-muted);
  }
  .env-child {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0 10px 14px; border-bottom: 1px solid var(--border);
    cursor: pointer; border-radius: 4px; -webkit-tap-highlight-color: transparent;
  }
  .env-child:last-child { border-bottom: none; }
  .env-child:active { background: #f0efe9; }
  .env-child-left { min-width: 0; flex: 1; }
  .env-child-name {
    font-size: 13px; font-weight: 400; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .env-child-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .env-child-balance { font-size: 13px; font-weight: 500; font-variant-numeric: tabular-nums; }
  .env-child-chevron { font-size: 10px; color: var(--text-muted); }

  /* ---- Detail sheet (reuses txnDetailOverlay) ---- */
  .env-detail-bal {
    font-size: 28px; font-weight: 300; letter-spacing: -0.8px;
    font-variant-numeric: tabular-nums; margin-bottom: 12px;
  }
  .env-detail-actions { display: flex; gap: 8px; margin-bottom: 16px; }
  .env-detail-btn {
    font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 600;
    letter-spacing: 0.4px; text-transform: uppercase; border: none;
    border-radius: var(--radius); padding: 10px 0; cursor: pointer;
    flex: 1; transition: opacity 0.15s; touch-action: manipulation;
  }
  .env-detail-btn:hover { opacity: 0.8; }
  .env-detail-btn.primary { background: var(--accent); color: #fff; }
  .env-detail-btn.secondary { background: var(--bg); border: 1px solid var(--border); color: var(--text); }
  .env-detail-btn.danger { background: #fdf0ef; border: 1px solid #f5c6c2; color: var(--negative); }
  .env-inline-form {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px; margin-bottom: 14px;
  }
  .env-inline-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.6px; text-transform: uppercase;
    color: var(--text-muted); margin-bottom: 10px;
  }
  .env-inline-input {
    font-family: 'Montserrat', sans-serif; font-size: 15px; width: 100%;
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 14px; background: var(--surface); color: var(--text);
    outline: none; margin-bottom: 8px; box-sizing: border-box;
  }
  .env-inline-input:focus { border-color: var(--accent); }
  .env-inline-select {
    font-family: 'Montserrat', sans-serif; font-size: 13px; width: 100%;
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 10px 14px; background: var(--surface); color: var(--text);
    outline: none; margin-bottom: 8px; box-sizing: border-box; cursor: pointer;
  }
  .env-inline-select:focus { border-color: var(--accent); }
  .env-inline-submit {
    font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 600;
    letter-spacing: 0.4px; text-transform: uppercase; background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius); padding: 11px 0; width: 100%;
    cursor: pointer; transition: opacity 0.15s; touch-action: manipulation;
  }
  .env-inline-submit:hover { opacity: 0.85; }
  .env-inline-submit:disabled { opacity: 0.35; cursor: default; }
  .env-inline-cancel {
    font-size: 11px; color: var(--text-muted); text-align: center;
    display: block; margin-top: 8px; cursor: pointer;
  }
  .env-history-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 8px 0; border-bottom: 1px solid var(--border); gap: 8px;
  }
  .env-history-row:last-child { border-bottom: none; }
  .env-history-note { font-size: 12px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .env-history-date { font-size: 11px; color: var(--text-muted); font-weight: 300; margin-top: 1px; }
  .env-history-amt { font-size: 13px; font-weight: 500; font-variant-numeric: tabular-nums; flex-shrink: 0; }

  /* ---- Assign sheet (for pending items) ---- */
  .assign-sheet {
    position: fixed; inset: 0; background: var(--bg); z-index: 210;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .assign-sheet-inner {
    max-width: var(--max-w); width: 100%; margin: 0 auto;
    display: flex; flex-direction: column; height: 100%; overflow: hidden;
  }
  .assign-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: calc(env(safe-area-inset-top, 0px) + 16px) 20px 12px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .assign-title { font-size: 15px; font-weight: 600; color: var(--accent); letter-spacing: -0.2px; }
  .assign-close {
    font-family: 'Montserrat', sans-serif; background: none; border: none;
    font-size: 18px; color: var(--text-muted); cursor: pointer; padding: 4px 8px;
    border-radius: var(--radius); touch-action: manipulation;
  }
  .assign-body { flex: 1; overflow-y: auto; padding: 20px 20px 40px; }
  .assign-txn-info {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px; margin-bottom: 20px;
  }
  .assign-txn-desc { font-size: 14px; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
  .assign-txn-meta { font-size: 12px; color: var(--text-muted); font-weight: 300; }
  .assign-txn-amount { font-size: 20px; font-weight: 300; font-variant-numeric: tabular-nums; margin-top: 8px; }
  .assign-split-row {
    display: flex; align-items: center; gap: 10px; padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .assign-split-row:last-of-type { border-bottom: none; margin-bottom: 8px; }
  .assign-split-name { font-size: 13px; font-weight: 500; color: var(--text); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .assign-split-input {
    font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 500;
    width: 90px; border: 1px solid var(--border); border-radius: var(--radius);
    padding: 8px 10px; background: var(--surface); color: var(--text);
    outline: none; text-align: right; font-variant-numeric: tabular-nums; flex-shrink: 0;
  }
  .assign-split-input:focus { border-color: var(--accent); }
  .assign-remainder { font-size: 12px; color: var(--text-muted); font-weight: 300; padding: 10px 0 16px; min-height: 34px; }
  .assign-remainder.warn { color: var(--negative); font-weight: 500; }
  .assign-confirm {
    font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600;
    letter-spacing: 0.4px; text-transform: uppercase; background: var(--positive); color: #fff;
    border: none; border-radius: var(--radius); padding: 14px 0; width: 100%;
    cursor: pointer; transition: opacity 0.15s; touch-action: manipulation; margin-bottom: 10px;
  }
  .assign-confirm:hover { opacity: 0.85; }
  .assign-confirm:disabled { opacity: 0.35; cursor: default; }
  .assign-dismiss {
    font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 500;
    background: none; border: 1px solid var(--border); border-radius: var(--radius);
    padding: 13px 0; width: 100%; cursor: pointer; color: var(--text-muted);
    touch-action: manipulation;
  }

  /* ---- Alloc sheet (income full split) ---- */
  .alloc-sheet {
    position: fixed; inset: 0; background: var(--bg); z-index: 200;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .alloc-sheet-inner {
    max-width: var(--max-w); width: 100%; margin: 0 auto;
    display: flex; flex-direction: column; height: 100%; overflow: hidden;
  }
  .alloc-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: calc(env(safe-area-inset-top, 0px) + 16px) 20px 12px;
    border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .alloc-title { font-size: 15px; font-weight: 600; color: var(--accent); letter-spacing: -0.2px; }
  .alloc-close {
    font-family: 'Montserrat', sans-serif; background: none; border: none;
    font-size: 18px; color: var(--text-muted); cursor: pointer; padding: 4px 8px;
    border-radius: var(--radius); touch-action: manipulation;
  }
  .alloc-body { flex: 1; overflow-y: auto; padding: 20px 20px 40px; }
  /* Config section */
  .env-config-row { display: flex; justify-content: space-between; align-items: baseline;
    padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .env-config-row:last-child { border-bottom: none; }
  .env-config-label { color: var(--text); font-weight: 400; }
  .env-config-value { color: var(--text-muted); font-weight: 300; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
<div class="demo-banner" id="demoBanner" onclick="exitDemoPrompt()">Demo mode — tap to exit</div>
<div class="offline-banner" id="offlineBanner">You are offline — showing cached data</div>
<div class="app">
  <header>
    <h1 id="appTitle">hledger <span>— nayakashish</span></h1>
  </header>
  <div class="sync-row">
    <button class="sync-btn" id="addBtn" onclick="openAdd()">+ Add</button>
    <button class="sync-btn" id="syncBtn" onclick="syncNow()">Sync</button>
    <span class="sync-timestamp" id="syncTimestamp">not synced yet</span>
  </div>
  <div class="summary-cards" id="summaryCards"></div>
  <nav>
    <button class="active" onclick="showView('balance', this)">Balance</button>
    <!-- <button onclick="showView('is', this)">Income</button> -->
    <button onclick="showView('envelopes', this)">Envelopes</button>
    <button onclick="showView('monthly', this)">Monthly</button>
    <button onclick="showView('transactions', this)">Transactions</button>
  </nav>
  <div id="view-balance" class="view active"><div class="state-msg">Tap sync to load data.</div></div>
  <!-- <div id="view-is" class="view"><div class="state-msg">Tap sync to load data.</div></div> -->
  <div id="view-envelopes" class="view"><div class="state-msg">Tap sync to load data.</div></div>
  <div id="view-monthly" class="view"><div class="state-msg">Tap sync to load data.</div></div>
  <div id="view-transactions" class="view"><div class="state-msg">Tap sync to load data.</div></div>
</div>
<div id="toast" class="toast"></div>

<!-- Transaction Detail Sheet -->
<div id="txnDetailOverlay" class="txn-detail-overlay" onclick="closeTxnDetail(event)">
  <div class="txn-detail-sheet" id="txnDetailSheet">
    <div class="txn-detail-handle"></div>
    <div class="txn-detail-header">
      <div class="txn-detail-desc" id="txnDetailDesc"></div>
      <div class="txn-detail-date" id="txnDetailDate"></div>
    </div>
    <div class="txn-detail-body" id="txnDetailBody"></div>
  </div>
</div>

<!-- Add Transaction Sheet -->
<div id="addSheet" class="add-sheet" style="display:none">
  <div class="add-sheet-inner">
    <div class="add-header">
      <button class="add-back" id="addBackBtn" onclick="addBack()">&#8592;</button>
      <span class="add-title" id="addTitle">Date</span>
      <button class="add-close" onclick="closeAdd()">&#x2715;</button>
    </div>
    <div class="add-progress"><div class="add-progress-bar" id="addProgressBar"></div></div>
    <div class="add-body" id="addBody"></div>
  </div>
</div>

<!-- Assign sheet (for pending transactions) -->
<div id="assignSheet" class="assign-sheet" style="display:none">
  <div class="assign-sheet-inner">
    <div class="assign-header">
      <span class="assign-title" id="assignTitle">Assign transaction</span>
      <button class="assign-close" onclick="closeAssignSheet()">&#x2715;</button>
    </div>
    <div class="assign-body" id="assignBody"></div>
  </div>
</div>


<div id="allocSheet" class="alloc-sheet" style="display:none">
  <div class="alloc-sheet-inner">
    <div class="alloc-header">
      <span class="alloc-title">Allocate Income</span>
      <button class="alloc-close" onclick="closeAllocSheet()">&#x2715;</button>
    </div>
    <div class="alloc-body" id="allocBody"></div>
  </div>
</div>


<!-- PIN Modal -->
<div id="pinModal" class="pin-modal-overlay" style="display:none">
  <div class="pin-modal">
    <div class="pin-modal-title">Exit demo mode</div>
    <div class="pin-modal-sub">Enter your PIN to return to your data</div>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot" id="dot0"></div><div class="pin-dot" id="dot1"></div>
      <div class="pin-dot" id="dot2"></div><div class="pin-dot" id="dot3"></div>
    </div>
    <div class="pin-error-msg" id="pinError"></div>
    <div class="pin-keypad">
      <button class="pin-key" onclick="pinKey('1')">1</button>
      <button class="pin-key" onclick="pinKey('2')">2</button>
      <button class="pin-key" onclick="pinKey('3')">3</button>
      <button class="pin-key" onclick="pinKey('4')">4</button>
      <button class="pin-key" onclick="pinKey('5')">5</button>
      <button class="pin-key" onclick="pinKey('6')">6</button>
      <button class="pin-key" onclick="pinKey('7')">7</button>
      <button class="pin-key" onclick="pinKey('8')">8</button>
      <button class="pin-key" onclick="pinKey('9')">9</button>
      <button class="pin-key cancel" onclick="closePinModal()">Cancel</button>
      <button class="pin-key" onclick="pinKey('0')">0</button>
      <button class="pin-key delete" onclick="pinDelete()">&#x232B;</button>
    </div>
  </div>
</div>
<script>
  const API = '';

  // ── Demo mode ─────────────────────────────────────────────────────────────
  let titleTapCount = 0, titleTapTimer = null;
  const appTitle = document.getElementById('appTitle');
  appTitle.addEventListener('touchend', (e) => {
    e.preventDefault();
    titleTapCount++;
    clearTimeout(titleTapTimer);
    titleTapTimer = setTimeout(() => { titleTapCount = 0; }, 600);
    if (titleTapCount >= 3) { titleTapCount = 0; clearTimeout(titleTapTimer); enterDemoMode(); }
  }, { passive: false });
  appTitle.addEventListener('click', () => {
    if ('ontouchend' in window) return;
    titleTapCount++;
    clearTimeout(titleTapTimer);
    titleTapTimer = setTimeout(() => { titleTapCount = 0; }, 600);
    if (titleTapCount >= 3) { titleTapCount = 0; clearTimeout(titleTapTimer); enterDemoMode(); }
  });
  function isDemoMode() { return sessionStorage.getItem('hledger_demo') === '1'; }
  function enterDemoMode() {
    sessionStorage.setItem('hledger_demo', '1');
    document.getElementById('demoBanner').classList.add('visible');
    document.body.classList.add('is-demo');
    showToast('Demo mode on'); loadAll();
  }
  function exitDemoMode() {
    sessionStorage.removeItem('hledger_demo');
    document.getElementById('demoBanner').classList.remove('visible');
    document.body.classList.remove('is-demo');
    showToast('Back to your data'); loadAll();
  }

  // ── PIN modal ─────────────────────────────────────────────────────────────
  let pinValue = '', pinChecking = false;
  function exitDemoPrompt() {
    pinValue = ''; pinChecking = false; updatePinDots();
    document.getElementById('pinError').textContent = '';
    document.getElementById('pinModal').style.display = 'flex';
  }
  function closePinModal() {
    document.getElementById('pinModal').style.display = 'none';
    pinValue = ''; pinChecking = false; updatePinDots();
  }
  function pinKey(digit) {
    if (pinValue.length >= 4 || pinChecking) return;
    pinValue += digit; updatePinDots();
    if (pinValue.length === 4) setTimeout(checkPin, 80);
  }
  function pinDelete() {
    if (pinChecking) return;
    pinValue = pinValue.slice(0, -1); updatePinDots();
    document.getElementById('pinError').textContent = '';
  }
  function updatePinDots() {
    for (let i = 0; i < 4; i++) {
      const dot = document.getElementById('dot' + i);
      dot.classList.toggle('filled', i < pinValue.length);
      dot.classList.remove('error');
    }
  }
  async function checkPin() {
    pinChecking = true;
    try {
      const r = await fetch('/api/demo/verify-pin', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pin: pinValue }),
      });
      const data = await r.json();
      if (data.ok) { closePinModal(); exitDemoMode(); }
      else {
        for (let i = 0; i < 4; i++) document.getElementById('dot' + i).classList.add('error');
        document.getElementById('pinError').textContent = 'Incorrect PIN';
        setTimeout(() => { pinValue = ''; pinChecking = false; updatePinDots();
          document.getElementById('pinError').textContent = ''; }, 900);
      }
    } catch (e) {
      document.getElementById('pinError').textContent = 'Network error — try again';
      pinValue = ''; pinChecking = false; updatePinDots();
    }
  }

  // ── State ────────────────────────────────────────────────────────────────
  let cache = {};
  const CACHE_KEY = 'hledger_cache', SYNC_KEY = 'hledger_last_sync';
  function saveCache() {
    try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
      localStorage.setItem(SYNC_KEY, new Date().toISOString()); } catch(e) {}
  }
  function loadCache() {
    try {
      const raw = localStorage.getItem(CACHE_KEY);
      if (raw) cache = JSON.parse(raw);
      const ts = localStorage.getItem(SYNC_KEY);
      if (ts) {
        const dt = new Date(ts);
        const time = dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        const date = dt.toLocaleDateString([], { month: 'short', day: 'numeric' });
        const isToday = dt.toDateString() === new Date().toDateString();
        document.getElementById('syncTimestamp').textContent =
          'last synced ' + (isToday ? time : date + ' ' + time);
      }
    } catch(e) {}
  }

  // ── Startup ──────────────────────────────────────────────────────────────
  (function init() {
    if (isDemoMode()) {
      document.getElementById('demoBanner').classList.add('visible');
      document.body.classList.add('is-demo');
    }
    loadCache();
    if (cache['balance']) renderSummaryCards(cache['balance']);
    const active = document.querySelector('.view.active');
    if (active) {
      const name = active.id.replace('view-', '');
      if (cache[name]) renderView(name, cache[name]);
      else if (Object.keys(cache).length === 0)
        active.innerHTML = '<div class="state-msg">Tap sync to load data.</div>';
    }
  })();

  // ── Navigation ───────────────────────────────────────────────────────────
  function showView(name, btn) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    btn.classList.add('active');
    if (cache[name]) renderView(name, cache[name]);
  }

  // ── Sync ─────────────────────────────────────────────────────────────────
  async function syncNow() {
    const btn = document.getElementById('syncBtn');
    const ts  = document.getElementById('syncTimestamp');
    btn.disabled = true; btn.textContent = 'Syncing...'; ts.textContent = '';
    try {
      if (!isDemoMode()) {
        const r = await fetch(`${API}/api/sync`, { method: 'POST' });
        if (!r.ok) {
          let detail = '';
          try { const j = await r.json(); detail = j.detail || ''; } catch(e) {}
          throw new Error(detail || 'status ' + r.status);
        }
        const syncResult = await r.json();
        if (syncResult.detail && syncResult.detail.toLowerCase().includes('conflict')) {
          showToast('Sync conflict — check journal manually', 4000);
          ts.textContent = 'sync warning'; btn.disabled = false; btn.textContent = 'Sync'; return;
        }
      }
      await loadAll();
      const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
      ts.textContent = 'last synced ' + now;
    } catch (e) {
      ts.textContent = 'sync failed'; showToast('Sync failed: ' + e.message, 4000); console.error(e);
    } finally { btn.disabled = false; btn.textContent = 'Sync'; }
  }

  // ── Load all ─────────────────────────────────────────────────────────────
  function currentMonth() {
    const now = new Date();
    return now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
  }
  async function loadAll() {
    await Promise.all([
      loadEndpoint('balance'), loadEndpoint('is'), loadEndpoint('monthly'),
      loadEndpoint('transactions', { month: currentMonth() }),
      loadEnvelopes(),   
    ]);
    saveCache(); fetchAccounts(); fetchDescriptions();
    if (cache['balance']) renderSummaryCards(cache['balance']);
    const active = document.querySelector('.view.active');
    if (active) {
      const name = active.id.replace('view-', '');
      if (cache[name]) renderView(name, cache[name]);
    }
  }
  async function loadEndpoint(name, params) {
    try {
      const qs = params ? '?' + new URLSearchParams(params).toString() : '';
      const prefix = isDemoMode() ? '/api/demo' : '/api';
      const r = await fetch(`${prefix}/${name}${qs}`);
      if (!r.ok) throw new Error(`${r.status}`);
      const json = await r.json();
      cache[name] = JSON.parse(json.raw);
    } catch (e) { cache[name] = { error: e.message }; }
  }

  // ── Render dispatcher ────────────────────────────────────────────────────
  function renderView(name, data) {
    const el = document.getElementById('view-' + name);
    if (data.error) { el.innerHTML = `<div class="error-msg">Error: ${data.error}</div>`; return; }
    if (name === 'balance')      renderBalance(el, data);
    if (name === 'is')           renderIS(el, data);
    if (name === 'monthly')      renderMonthly(el, data);
    if (name === 'transactions') renderTransactions(el, data);
    if (name === 'envelopes') renderEnvelopes(el, data);
  }

  // ── Format helpers ────────────────────────────────────────────────────────
  function fmtAmount(num, commodity) {
    const sym = commodity || '$';
    const abs = Math.abs(num).toFixed(2);
    const formatted = sym + parseFloat(abs).toLocaleString('en-CA', { minimumFractionDigits: 2 });
    return num < 0 ? `-${formatted}` : formatted;
  }
  function amountClass(num) {
    if (num > 0) return 'amount-positive';
    if (num < 0) return 'amount-negative';
    return 'amount-neutral';
  }
  function extractAmount(amounts) {
    if (!amounts || amounts.length === 0) return { val: 0, commodity: '$' };
    const a = amounts[0];
    const val = typeof a.aquantity === 'object'
      ? parseFloat(a.aquantity.decimalMantissa) / Math.pow(10, a.aquantity.decimalPlaces || 0)
      : parseFloat(a.aquantity) || 0;
    return { val, commodity: a.acommodity || '$' };
  }

  // ── Balance renderer ──────────────────────────────────────────────────────
  function renderBalance(el, data) {
    const rows = Array.isArray(data) && Array.isArray(data[0]) ? data[0] : null;
    if (!rows || rows.length === 0) { el.innerHTML = '<div class="state-msg">No data.</div>'; return; }
    const amountMap = {};
    rows.forEach(row => { amountMap[row[0]] = row[3]; });
    const allNames = new Set();
    rows.forEach(row => {
      const parts = row[0].split(':');
      for (let i = 1; i <= parts.length; i++) allNames.add(parts.slice(0, i).join(':'));
    });
    const sorted = Array.from(allNames).sort();
    const groups = {}, groupOrder = [];
    sorted.forEach(name => {
      const top = name.split(':')[0];
      if (!groups[top]) { groups[top] = []; groupOrder.push(top); }
      if (name !== top) groups[top].push(name);
    });
    let html = '';
    groupOrder.forEach(group => {
      html += '<div class="section-title">' + group + '</div>';
      groups[group].forEach(fullName => {
        const depth = (fullName.match(/:/g) || []).length;
        const amounts = amountMap[fullName] || [];
        const { val, commodity } = extractAmount(amounts);
        const label = fullName.split(':').pop();

        html += '<div class="account-row">'
          + '<span class="account-name" style="padding-left:' + indentPx + 'px;'
          + (hasChildren ? 'font-weight:500;color:var(--accent);' : '') + '">' + label + '</span>'
          + '<span class="account-amount ' + amountClass(val) + '">'
          + (amounts.length > 0 ? fmtAmount(val, commodity) : '') + '</span>'
          + '</div>';
      });
      html += '<br>';
    });
    html += '<div class="view-footer">Data shown via <code>hledger balance</code>.</div>';

  // ── Income Statement renderer ─────────────────────────────────────────────

  // ── Transaction detail sheet ──────────────────────────────────────────────
  function openTxnDetail(txn) {
    document.getElementById('txnDetailDesc').textContent = txn.tdescription || txn.tpayee || '—';
    const dateStr = txn.tdate || '';
    const dateLabel = dateStr ? new Date(dateStr + 'T00:00:00').toLocaleDateString('en-CA',
      { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }) : '—';
    document.getElementById('txnDetailDate').textContent = dateLabel;

    const postings = txn.tpostings || [];
    let html = '';

    // Transaction-level comment
    const tcomment = (txn.tcomment || '').trim();
    if (tcomment) {
      html += '<div class="txn-detail-section">'
        + '<div class="txn-detail-section-label">Note</div>'
        + '<div class="txn-detail-comment-box">; ' + escHtml(tcomment) + '</div>'
        + '</div>';
    }

    // Postings
    html += '<div class="txn-detail-section">'
      + '<div class="txn-detail-section-label">Postings</div>';
    postings.forEach(p => {
      const acct = p.paccount || '—';
      const { val, commodity } = extractAmount(p.pamount);
      const hasAmount = p.pamount && p.pamount.length > 0;
      const comment = (p.pcomment || '').trim();
      html += '<div class="posting-row">'
        + '<div class="posting-left">'
        + '<div class="posting-account">' + escHtml(acct) + '</div>'
        + (comment ? '<div class="posting-comment">; ' + escHtml(comment) + '</div>' : '')
        + '</div>'
        + '<div class="posting-amount ' + amountClass(val) + '">'
        + (hasAmount ? fmtAmount(val, commodity) : '') + '</div>'
        + '</div>';
    });
    html += '</div>';

    // Raw hledger-style rendering
    let raw = (txn.tdate || '') + ' ' + escHtml(txn.tdescription || '');
    if (tcomment) raw += '\n    ; ' + escHtml(tcomment);
    postings.forEach(p => {
      const acct = p.paccount || '';
      const { val, commodity } = extractAmount(p.pamount);
      const hasAmount = p.pamount && p.pamount.length > 0;
      const amtStr = hasAmount ? '    ' + fmtAmount(val, commodity) : '';
      const pcomment = (p.pcomment || '').trim();
      raw += '\n    ' + escHtml(acct) + amtStr;
      if (pcomment) raw += '\n        ; ' + escHtml(pcomment);
    });
    html += '<div class="txn-detail-section">'
      + '<div class="txn-detail-section-label">Raw entry</div>'
      + '<pre class="txn-detail-raw">' + raw + '</pre>'
      + '</div>';

    document.getElementById('txnDetailBody').innerHTML = html;
    const overlay = document.getElementById('txnDetailOverlay');
    overlay.style.display = 'flex';
    document.body.style.overflow = 'hidden';
    requestAnimationFrame(() => {
      overlay.classList.add('open');
      _initSheetSwipe();
    });
  }

  function closeTxnDetail(e) {
    if (e && e.target !== document.getElementById('txnDetailOverlay')) return;
    _doCloseTxnDetail();
  }
  function _doCloseTxnDetail() {
    const overlay = document.getElementById('txnDetailOverlay');
    const sheet = document.getElementById('txnDetailSheet');
    sheet.style.transition = 'transform 0.25s cubic-bezier(0.32, 0.72, 0, 1)';
    sheet.style.transform = '';
    overlay.classList.remove('open');
    document.body.style.overflow = '';
    setTimeout(() => { overlay.style.display = 'none'; sheet.style.transform = ''; }, 260);
  }

  function _initSheetSwipe() {
    const sheet = document.getElementById('txnDetailSheet');
    const body = document.getElementById('txnDetailBody');
    let startY = 0, startScrollTop = 0, dragging = false, currentY = 0;

    function onTouchStart(e) {
      startY = e.touches[0].clientY;
      startScrollTop = body.scrollTop;
      dragging = false;
      currentY = 0;
      sheet.style.transition = 'none';
    }

    function onTouchMove(e) {
      const dy = e.touches[0].clientY - startY;
      currentY = dy;
      // Only hijack the gesture if:
      // - swiping down AND body is scrolled to top
      if (dy > 0 && body.scrollTop <= 0) {
        dragging = true;
        e.preventDefault();
        sheet.style.transform = 'translateY(' + Math.max(0, dy) + 'px)';
      }
    }

    function onTouchEnd() {
      sheet.style.transition = 'transform 0.25s cubic-bezier(0.32, 0.72, 0, 1)';
      if (dragging && currentY > 80) {
        _doCloseTxnDetail();
      } else {
        sheet.style.transform = 'translateY(0)';
      }
      dragging = false;
    }

    sheet.addEventListener('touchstart', onTouchStart, { passive: true });
    sheet.addEventListener('touchmove', onTouchMove, { passive: false });
    sheet.addEventListener('touchend', onTouchEnd, { passive: true });
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Transactions renderer ─────────────────────────────────────────────────
  // Stores all loaded txns for the search feature
  let allTxnsCache = [];

  function buildTxnRow(txn) {
    const desc = txn.tdescription || txn.tpayee || '—';
    const date = txn.tdate || '';
    const postings = txn.tpostings || [];
    let amountHtml = '';
    if (postings.length > 0) {
      const { val, commodity } = extractAmount(postings[0].pamount);
      amountHtml = '<span class="txn-amount ' + amountClass(val) + '">' + fmtAmount(val, commodity) + '</span>';
    }
    const accountNames = postings.map(p => p.paccount || '').filter(Boolean).join(' · ');
    // Store txn data on the row via a data attribute index; we'll use a closure instead
    return { desc, date, accountNames, amountHtml };
  }

  function renderTxnList(txns, container) {
    if (!txns || txns.length === 0) {
      container.innerHTML = '<div class="state-msg">No transactions found.</div>';
      return;
    }
    container.innerHTML = '';
    txns.forEach(txn => {
      const { desc, date, accountNames, amountHtml } = buildTxnRow(txn);
      const div = document.createElement('div');
      div.className = 'txn';
      div.innerHTML = '<div class="txn-top"><span class="txn-desc">' + escHtml(desc) + '</span>' + amountHtml + '</div>'
        + '<div class="txn-meta">' + escHtml(date) + (accountNames ? ' &nbsp;&middot;&nbsp; ' + escHtml(accountNames) : '') + '</div>';
      div.addEventListener('click', () => openTxnDetail(txn));
      container.appendChild(div);
    });
  }

  function renderTransactions(el, data) {
    if (!Array.isArray(data) || data.length === 0) { el.innerHTML = '<div class="state-msg">No transactions.</div>'; return; }

    allTxnsCache = data; // save for search

    const now = new Date();
    const startYear = 2026, startMonth = 1;
    const endYear = now.getFullYear(), endMonth = now.getMonth() + 1;
    const monthKeys = [];
    for (let y = endYear; y >= startYear; y--) {
      const mStart = (y === endYear) ? endMonth : 12;
      const mEnd   = (y === startYear) ? startMonth : 1;
      for (let m = mStart; m >= mEnd; m--) monthKeys.push(y + '-' + String(m).padStart(2, '0'));
    }
    const latestMonth = currentMonth();
    const months = {};
    monthKeys.forEach(k => {
      const dt = new Date(k + '-01T00:00:00');
      months[k] = dt.toLocaleDateString('en-CA', { month: 'long', year: 'numeric' });
    });
    const options = monthKeys.map(k =>
      '<option value="' + k + '"' + (k === latestMonth ? ' selected' : '') + '>' + months[k] + '</option>'
    ).join('');

    el.innerHTML =
      '<div class="search-wrap">'
      + '<input type="search" class="search-input" id="txnSearchInput" placeholder="Search all transactions…" autocomplete="off" autocorrect="off" spellcheck="false">'
      + '<button class="search-clear" id="txnSearchClear" title="Clear">&#x2715;</button>'
      + '</div>'
      + '<div id="txnSearchCount" class="search-count" style="display:none"></div>'
      + '<div class="month-select-row" id="txnMonthRow">'
      + '<select class="month-select" id="monthSelect" onchange="onMonthChange(this.value)">'
      + options + '</select></div>'
      + '<div id="txnList"></div>'
      + '<div class="view-footer">Data shown via <code>hledger print -p YYYY-MM</code>. Tap any row to expand.</div>';

    el._txnData = data;

    // Render current month initially
    const txnList = document.getElementById('txnList');
    const monthData = data.filter(t => (t.tdate || '').startsWith(latestMonth));
    renderTxnList(monthData, txnList);

    // Wire up search
    const searchInput = document.getElementById('txnSearchInput');
    const searchClear = document.getElementById('txnSearchClear');
    const searchCount = document.getElementById('txnSearchCount');
    const monthRow = document.getElementById('txnMonthRow');

    let searchDebounce = null;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(() => runTxnSearch(searchInput.value), 200);
    });
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchClear.classList.remove('visible');
      searchCount.style.display = 'none';
      monthRow.style.display = '';
      const sel = document.getElementById('monthSelect');
      const month = sel ? sel.value : latestMonth;
      const filtered = (el._txnData || []).filter(t => (t.tdate || '').startsWith(month));
      renderTxnList(filtered, txnList);
    });

    async function runTxnSearch(q) {
      const trimmed = q.trim();
      if (!trimmed) {
        searchClear.classList.remove('visible');
        searchCount.style.display = 'none';
        monthRow.style.display = '';
        const sel = document.getElementById('monthSelect');
        const month = sel ? sel.value : latestMonth;
        const filtered = (el._txnData || []).filter(t => (t.tdate || '').startsWith(month));
        renderTxnList(filtered, txnList);
        return;
      }
      searchClear.classList.add('visible');
      monthRow.style.display = 'none';
      txnList.innerHTML = '<div class="state-msg">Searching…</div>';
      try {
        const prefix = isDemoMode() ? '/api/demo' : '/api';
        const r = await fetch(`${prefix}/search?q=` + encodeURIComponent(trimmed));
        if (!r.ok) throw new Error(r.status);
        const json = await r.json();
        const results = JSON.parse(json.raw);
        const count = results.length;
        searchCount.textContent = count === 0 ? 'No results' : count + ' result' + (count === 1 ? '' : 's');
        searchCount.style.display = 'block';
        renderTxnList(results, txnList);
      } catch(e) {
        txnList.innerHTML = '<div class="error-msg">Search failed: ' + e.message + '</div>';
      }
    }
  }

  async function onMonthChange(monthKey) {
    const list = document.getElementById('txnList');
    if (!list) return;
    // If search is active, don't override
    const searchInput = document.getElementById('txnSearchInput');
    if (searchInput && searchInput.value.trim()) return;
    list.innerHTML = '<div class="state-msg">Loading…</div>';
    try {
      const prefix = isDemoMode() ? '/api/demo' : '/api';
      const r = await fetch(`${prefix}/transactions?month=${monthKey}`);
      if (!r.ok) throw new Error(r.status);
      const json = await r.json();
      const data = JSON.parse(json.raw);
      cache['transactions'] = data;
      allTxnsCache = data;
      const el = document.getElementById('view-transactions');
      if (el) el._txnData = data;
      renderTxnList(data, list);
    } catch (e) {
      list.innerHTML = '<div class="error-msg">Failed to load: ' + e.message + '</div>';
    }
  }

  // ── Summary cards ─────────────────────────────────────────────────────────
  function renderSummaryCards(balanceData) {
    const el = document.getElementById('summaryCards');
    if (!el) return;
    const rows = Array.isArray(balanceData) && Array.isArray(balanceData[0]) ? balanceData[0] : [];
    let assets = 0, liabilities = 0, commodity = '$';
    rows.forEach(row => {
      const name = row[0];
      const amounts = row[3];
      const { val, commodity: com } = extractAmount(amounts);

      if (name.startsWith('liabilities')) liabilities += val;

    el.innerHTML = '<div class="summary-card">'
        + '<div class="card-label">Assets</div>'
        + '<div class="card-value amount-positive">' + fmtAmount(assets, commodity) + '</div>'
        + '</div>'

        + '<div class="card-label">Liabilities</div>'
        + '<div class="card-value amount-negative">' + fmtAmount(Math.abs(liabilities), commodity) + '</div>'
        + '</div>'
      + '<div class="summary-card">'
        + '<div class="card-label">Net Worth</div>'
        + '<div class="card-value ' + amountClass(net) + '">' + fmtAmount(net, commodity) + '</div>'
