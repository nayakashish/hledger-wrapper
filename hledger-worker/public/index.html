  // ── Add Transaction ────────────────────────────────────────────────────────
  const STEPS = ['date', 'description', 'account1', 'amount1', 'account2', 'amount2', 'preview'];
  const STEP_TITLES = { date:'Date', description:'Description', account1:'Account 1', amount1:'Amount', account2:'Account 2', amount2:'Amount 2', preview:'Preview' };
  let addState = {}, addStepIdx = 0, accountsList = [], descriptionsList = [];

  async function fetchDescriptions() {
    try { const c = localStorage.getItem('hledger_descriptions'); if (c) descriptionsList = JSON.parse(c); } catch(e) {}
    if (isDemoMode()) return;
    try {
      const r = await fetch(`${API}/api/descriptions`);
      if (!r.ok) return;
      const json = await r.json();
      descriptionsList = json.descriptions || [];
      localStorage.setItem('hledger_descriptions', JSON.stringify(descriptionsList));
    } catch(e) {}
  }

  async function lookupDescription(desc) {
    if (isDemoMode()) return null;
    try {
      const r = await fetch(`${API}/api/lookup?description=` + encodeURIComponent(desc));
      if (!r.ok) return null;
      const json = await r.json();
      return json.match || null;
    } catch(e) { return null; }
  }

  function showToast(msg, duration) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration || 2500);
  }

  function openAdd() {
    if (isDemoMode()) { showToast('Add disabled in demo mode', 2500); return; }
    addState = {}; addStepIdx = 0;
    document.getElementById('addSheet').style.display = 'flex';
    document.body.style.overflow = 'hidden';
    if (accountsList.length === 0) fetchAccounts();
    if (descriptionsList.length === 0) fetchDescriptions();
    renderAddStep();
  }

  function closeAdd() {
    document.getElementById('addSheet').style.display = 'none';
    document.body.style.overflow = '';
  }

  function addBack() {
    if (addStepIdx === 0) { closeAdd(); return; }
    addStepIdx--; renderAddStep();
  }

  async function fetchAccounts() {
    try { const c = localStorage.getItem('hledger_accounts'); if (c) accountsList = JSON.parse(c); } catch(e) {}
    if (isDemoMode()) return;
    try {
      const r = await fetch(`${API}/api/accounts`);
      if (!r.ok) return;
      const json = await r.json();
      accountsList = json.accounts || [];
      localStorage.setItem('hledger_accounts', JSON.stringify(accountsList));
    } catch(e) {}
  }

  function setProgress() {
    const pct = ((addStepIdx + 1) / STEPS.length) * 100;
    document.getElementById('addProgressBar').style.width = pct + '%';
    document.getElementById('addTitle').textContent = STEP_TITLES[STEPS[addStepIdx]];
    document.getElementById('addBackBtn').style.visibility = addStepIdx === 0 ? 'hidden' : 'visible';
  }

  function renderAddStep() {
    setProgress();
    const step = STEPS[addStepIdx];
    const body = document.getElementById('addBody');

    if (step === 'date') {
      const today = new Date(), yesterday = new Date(today);
      yesterday.setDate(today.getDate() - 1);
      const fmt = d => d.toISOString().slice(0, 10);
      const fmtLabel = d => d.toLocaleDateString('en-CA', { weekday: 'long', month: 'long', day: 'numeric' });
      body.innerHTML = '<div class="step-label">Select a date</div>'
        + '<div class="step-options">'
        + '<button class="step-option' + (addState.date === fmt(today) || !addState.date ? ' selected' : '') + '" onclick="selectDate(\'' + fmt(today) + '\', this)">Today &nbsp;<span style="color:var(--text-muted);font-size:12px">' + fmtLabel(today) + '</span></button>'
        + '<button class="step-option' + (addState.date === fmt(yesterday) ? ' selected' : '') + '" onclick="selectDate(\'' + fmt(yesterday) + '\', this)">Yesterday &nbsp;<span style="color:var(--text-muted);font-size:12px">' + fmtLabel(yesterday) + '</span></button>'
        + '<button class="step-option" id="customDateOption" onclick="showDatePicker()">Pick a date&hellip;</button>'
        + '</div>'
        + '<input type="date" id="customDateInput" class="step-input" style="display:none" onchange="selectDate(this.value, null, true)">'
        + '<button class="step-next" onclick="advanceStep()">Continue</button>';
      if (!addState.date) addState.date = fmt(today);
    }

    else if (step === 'description') {
      body.innerHTML = '<div class="step-label">What was this for?</div>'
        + '<div class="autocomplete-wrap">'
        + '<input type="text" id="descInput" class="step-input" placeholder="e.g. Groceries, Rent, Salary" value="' + (addState.description || '') + '">'
        + '<div class="autocomplete-list" id="descList" style="display:none"></div>'
        + '</div>'
        + '<button class="step-next" id="descNext"' + (addState.description ? '' : ' disabled') + '>Continue</button>';
      setTimeout(() => {
        const inp = document.getElementById('descInput');
        const nextBtn = document.getElementById('descNext');
        const list = document.getElementById('descList');
        if (!inp) return;
        inp.focus();
        if (addState.description) inp.select();

        function showDescSuggestions(val) {
          addState.description = val;
          if (nextBtn) nextBtn.disabled = !val.trim();
          if (!val.trim() || descriptionsList.length === 0) { list.style.display = 'none'; return; }
          const q = val.toLowerCase();
          const matches = descriptionsList.filter(d => d.toLowerCase().includes(q)).slice(0, 8);
          if (!matches.length) { list.style.display = 'none'; return; }
          list.innerHTML = matches.map(d => '<div class="autocomplete-item">' + escHtml(d) + '</div>').join('');
          list.style.display = 'block';
          list.querySelectorAll('.autocomplete-item').forEach((item, i) => {
            item.addEventListener('click', () => {
              inp.value = matches[i]; addState.description = matches[i];
              list.style.display = 'none';
              if (nextBtn) nextBtn.disabled = false;
            });
          });
        }

        inp.addEventListener('input', () => showDescSuggestions(inp.value));
        inp.addEventListener('keydown', e => {
          const items = Array.from(list.querySelectorAll('.autocomplete-item'));
          const highlighted = list.querySelector('.highlighted');
          const idx = highlighted ? items.indexOf(highlighted) : -1;
          if (e.key === 'ArrowDown') { e.preventDefault(); if (!items.length) return; if (highlighted) highlighted.classList.remove('highlighted'); items[Math.min(idx+1,items.length-1)].classList.add('highlighted'); }
          else if (e.key === 'ArrowUp') { e.preventDefault(); if (highlighted) highlighted.classList.remove('highlighted'); if (idx > 0) items[idx-1].classList.add('highlighted'); }
          else if (e.key === 'Enter') { if (highlighted) { e.preventDefault(); highlighted.click(); } else if (inp.value.trim()) { list.style.display = 'none'; advanceDescStep(); } }
        });
        if (nextBtn) nextBtn.addEventListener('click', advanceDescStep);

        async function advanceDescStep() {
          addState.description = inp.value.trim();
          if (!addState.description) return;
          nextBtn.disabled = true; nextBtn.textContent = 'Looking up...';
          const match = await lookupDescription(addState.description);
          addState._predicted = match || null;
          addState._amount2edited = false;
          addStepIdx++; renderAddStep();
        }
      }, 50);
    }

    else if (step === 'account1' || step === 'account2') {
      const which = step === 'account1' ? 1 : 2;
      const stateKey = step;
      if (!addState[stateKey] && addState._predicted && addState._predicted[stateKey]) addState[stateKey] = addState._predicted[stateKey];
      const current = addState[stateKey] || '';
      body.innerHTML = '<div class="step-label">Account ' + which + '</div>'
        + '<div class="autocomplete-wrap">'
        + '<input type="text" id="acctInput" class="step-input" placeholder="e.g. expenses:food:groceries" value="' + escHtml(current) + '" autocomplete="off" autocorrect="off" spellcheck="false" style="padding-right:' + (current ? '36px' : '16px') + '">'
        + (current ? '<button class="input-clear-btn" id="acctClearBtn" title="Clear">&#x2715;</button>' : '')
        + '<div class="autocomplete-list" id="acctList" style="display:none"></div>'
        + '</div>'
        + '<button class="step-next" id="acctNext"' + (current ? '' : ' disabled') + '>Continue</button>';
      setTimeout(() => {
        const inp = document.getElementById('acctInput');
        const nextBtn = document.getElementById('acctNext');
        const sk = stateKey;
        const clearBtn = document.getElementById('acctClearBtn');
        if (clearBtn) {
          clearBtn.addEventListener('click', () => {
            inp.value = ''; addState[sk] = ''; clearBtn.style.display = 'none'; inp.style.paddingRight = '16px';
            const nb = document.getElementById('acctNext'); if (nb) nb.disabled = true;
            inp.focus(); onAcctInput('', sk);
          });
        }
        if (inp) {
          inp.addEventListener('input', () => onAcctInput(inp.value, sk));
          inp.addEventListener('keydown', e => {
            const list = document.getElementById('acctList');
            const items = list ? Array.from(list.querySelectorAll('.autocomplete-item')) : [];
            const highlighted = list ? list.querySelector('.highlighted') : null;
            const idx = highlighted ? items.indexOf(highlighted) : -1;
            if (e.key === 'ArrowDown') { e.preventDefault(); if (!items.length) return; if (highlighted) highlighted.classList.remove('highlighted'); items[Math.min(idx+1,items.length-1)].classList.add('highlighted'); }
            else if (e.key === 'ArrowUp') { e.preventDefault(); if (highlighted) highlighted.classList.remove('highlighted'); if (idx > 0) items[idx-1].classList.add('highlighted'); }
            else if (e.key === 'Enter' || e.key === 'Tab') { if (highlighted) { e.preventDefault(); highlighted.click(); } else if (e.key === 'Enter' && inp.value.trim()) { e.preventDefault(); advanceFromAccount(sk); } }
          });
          inp.focus();
        }
        if (nextBtn) nextBtn.addEventListener('click', () => advanceFromAccount(sk));
      }, 50);
    }

    else if (step === 'amount1' || step === 'amount2') {
      const stateKey = step;
      if (addState[stateKey] === undefined && addState._predicted && addState._predicted[stateKey] !== undefined) addState[stateKey] = addState._predicted[stateKey];
      const defaultVal = step === 'amount2'
        ? (addState._amount2edited ? addState.amount2 : (addState.amount1 !== undefined ? -addState.amount1 : ''))
        : (addState.amount1 !== undefined ? addState.amount1 : '');
      body.innerHTML = '<div class="step-label">' + (step === 'amount1' ? 'How much?' : 'Offsetting amount') + '</div>'
        + '<input type="number" id="amtInput" class="step-input" placeholder="0.00" step="0.01" value="' + defaultVal + '" oninput="addState.' + stateKey + '=parseFloat(this.value)" onkeydown="if(event.key===\'Enter\')advanceStep()">'
        + (step === 'amount2' ? '<div style="font-size:11px;color:var(--text-muted);margin-bottom:12px">Defaults to inverse of amount 1. Edit if needed.</div>' : '')
        + '<button class="step-next" onclick="advanceStep()">Continue</button>';
      setTimeout(() => {
        const inp = document.getElementById('amtInput');
        const sk = stateKey;
        if (!inp) return;
        inp.focus(); inp.select();
        inp.addEventListener('input', () => { addState[sk] = parseFloat(inp.value); if (sk === 'amount2') addState._amount2edited = true; });
        inp.addEventListener('keydown', e => { if (e.key === 'Enter') advanceStep(); });
      }, 50);
    }

    else if (step === 'preview') {
      const { date, description, account1, amount1, account2, amount2 } = addState;
      const a2 = amount2 !== undefined ? amount2 : -amount1;
      const currency = '$';
      const fmt = n => currency + Math.abs(n).toFixed(2);
      const sign = n => n < 0 ? '-' : '';
      const entryText = date + ' ' + description + '\n'
        + '    ' + account1 + '    ' + sign(amount1) + fmt(amount1) + '\n'
        + '    ' + account2 + '    ' + sign(a2) + fmt(a2);
      body.innerHTML = '<div class="step-label">Review entry</div>'
        + '<div style="font-size:11px;color:var(--text-muted);margin-bottom:6px;font-weight:300">Edit directly to add comments (use ; for inline comments)</div>'
        + '<textarea class="preview-entry" id="previewEntry" rows="6" spellcheck="false">' + entryText + '</textarea>'
        + '<button class="confirm-btn" id="confirmBtn" onclick="submitAdd()">Confirm &amp; Save</button>'
        + '<button class="cancel-btn" onclick="addBack()">Go back &amp; edit</button>';
    }
  }

  function selectDate(val, btn, fromPicker) {
    addState.date = val;
    document.querySelectorAll('.step-option').forEach(b => b.classList.remove('selected'));
    if (btn) btn.classList.add('selected');
    if (fromPicker) { const opt = document.getElementById('customDateOption'); if (opt) { opt.classList.add('selected'); opt.textContent = val; } }
  }

  function showDatePicker() {
    const inp = document.getElementById('customDateInput');
    if (!inp) return;
    inp.style.display = 'block';
    inp.value = addState.date || new Date().toISOString().slice(0, 10);
    inp.focus();
  }

  function onAcctInput(val, stateKey) {
    addState[stateKey] = val;
    const list = document.getElementById('acctList');
    const nextBtn = document.getElementById('acctNext');
    if (nextBtn) nextBtn.disabled = !val.trim();
    if (!val.trim() || accountsList.length === 0) { if (list) list.style.display = 'none'; return; }
    const q = val.toLowerCase();
    const matches = accountsList.filter(a => a.toLowerCase().includes(q)).slice(0, 8);
    if (matches.length === 0) { list.style.display = 'none'; return; }
    list.innerHTML = matches.map(a => '<div class="autocomplete-item">' + escHtml(a) + '</div>').join('');
    list.style.display = 'block';
    list.querySelectorAll('.autocomplete-item').forEach((item, i) => {
      item.addEventListener('click', () => selectAccount(matches[i], stateKey));
    });
  }

  function selectAccount(val, stateKey) {
    addState[stateKey] = val;
    const inp = document.getElementById('acctInput');
    const list = document.getElementById('acctList');
    const nextBtn = document.getElementById('acctNext');
    if (inp) inp.value = val;
    if (list) list.style.display = 'none';
    if (nextBtn) nextBtn.disabled = false;
  }

  function advanceFromAccount(stateKey) {
    const inp = document.getElementById('acctInput');
    if (inp) addState[stateKey] = inp.value.trim();
    if (!addState[stateKey]) return;
    addStepIdx++; renderAddStep();
  }

  function advanceStep() {
    const step = STEPS[addStepIdx];
    if (step === 'description') { const inp = document.getElementById('descInput'); if (inp) addState.description = inp.value.trim(); if (!addState.description) return; }
    if (step === 'amount1' || step === 'amount2') { const inp = document.getElementById('amtInput'); if (inp) addState[step] = parseFloat(inp.value); if (isNaN(addState[step])) return; }
    addStepIdx++; renderAddStep();
  }

  async function submitAdd() {
    const btn = document.getElementById('confirmBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }
    const a2 = addState.amount2 !== undefined ? addState.amount2 : -addState.amount1;
    const previewEl = document.getElementById('previewEntry');
    const rawEntry = previewEl ? previewEl.value : null;
    try {
      const r = await fetch(`${API}/api/add`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(rawEntry ? { raw_entry: rawEntry } : { date: addState.date, description: addState.description, account1: addState.account1, amount1: addState.amount1, account2: addState.account2, amount2: a2, currency: '$' })
      });
      if (!r.ok) { const err = await r.json(); throw new Error(err.detail || r.status); }
      closeAdd();
      showToast('Saved — syncing...');
      await syncNow();
      showToast('Synced');
    } catch(e) {
      if (btn) { btn.disabled = false; btn.textContent = 'Confirm & Save'; }
      document.getElementById('addBody').insertAdjacentHTML('afterbegin', '<div class="error-msg">Failed to save: ' + e.message + '</div>');
    }
  }

  // ── Offline detection ─────────────────────────────────────────────────────
  function updateOnlineStatus() {
    const banner = document.getElementById('offlineBanner');
    if (!banner) return;
    if (!navigator.onLine) { banner.classList.add('visible'); document.body.classList.add('is-offline'); }
    else { banner.classList.remove('visible'); document.body.classList.remove('is-offline'); }
  }
  window.addEventListener('online', updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);
  updateOnlineStatus();

  // ── Service Worker ────────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => { navigator.serviceWorker.register('/sw.js').catch(() => {}); });
  }


// ============================================================================
// Envelope state
// ============================================================================
let envData = null;
const ENV_CACHE_KEY = 'hledger_envelopes_v3';

function saveEnvCache(d) { try { localStorage.setItem(ENV_CACHE_KEY, JSON.stringify(d)); } catch(e) {} }
function loadEnvCache() { try { const r = localStorage.getItem(ENV_CACHE_KEY); return r ? JSON.parse(r) : null; } catch(e) { return null; } }

async function loadEnvelopes() {
  const cached = loadEnvCache();
  if (cached) { envData = cached; cache['envelopes'] = cached; }
  if (isDemoMode()) return;
  try {
    const r = await fetch(`${API}/api/envelopes`);
    if (!r.ok) return;
    const data = await r.json();
    envData = data; cache['envelopes'] = data;
    saveEnvCache(data);
    const el = document.getElementById('view-envelopes');
    if (el && el.classList.contains('active')) renderEnvelopes(el, data);
  } catch(e) {}
}

// ============================================================================
// Render envelopes tab
// ============================================================================
function renderEnvelopes(el, data) {
  if (!data || !data.envelopes) {
    el.innerHTML = '<div class="state-msg">Envelopes not set up.</div>';
    return;
  }
  envData = data;
  const envelopes = data.envelopes || [];
  const balances = data.balances || {};
  const pending = data.pending || [];

  let html = '';

  // Action bar
  html += '<div class="env-action-bar">'
    + '<button class="env-btn primary" onclick="scanTransactions()">Scan Txns</button>'
    + '<button class="env-btn outline" onclick="openNewEnvSheet()">+ Envelope</button>'
    + '</div>';

  // Pending section
  const pendingCount = pending.length;
  html += '<div class="env-section-title">Pending'
    + (pendingCount > 0 ? ' <span style="color:var(--negative);font-weight:600">(' + pendingCount + ')</span>' : '')
    + '</div>';

  if (pending.length === 0) {
    html += '<div style="font-size:12px;color:var(--text-muted);font-weight:300;padding:8px 0 16px">No pending transactions. Tap Scan Txns to check for new activity.</div>';
  } else {
    // Show most recent first
    const sorted = pending.slice().sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    sorted.forEach(txn => {
      const isIncome = txn.type === 'income';
      const amtColor = isIncome ? 'amount-positive' : 'amount-negative';
      const amtSign = isIncome ? '+' : '-';
      const badge = isIncome
        ? '<span class="pending-badge income">income</span>'
        : (txn.suggested_envelope
            ? '<span class="pending-badge suggested">suggested</span>'
            : '<span class="pending-badge expense">expense</span>');
      html += '<div class="pending-item" onclick="openAssignSheet(' + JSON.stringify(txn).replace(/"/g, '&quot;') + ')">'
        + '<div class="pending-top">'
        + '<span class="pending-desc">' + escHtml(txn.description) + badge + '</span>'
        + '<span class="pending-amount ' + amtColor + '">' + amtSign + fmtAmount(txn.amount, '$') + '</span>'
        + '</div>'
        + '<div class="pending-meta">' + (txn.date || '') + (txn.suggested_envelope ? ' · suggested: ' + escHtml(_envName(txn.suggested_envelope)) : '') + '</div>'
        + '</div>';
    });
  }

  // Envelope tree
  // Calculate envelope grand total
  const allEnvTotal = (envData.envelopes || []).reduce((sum, env) => {
    return sum + (balances[env.id] || 0);
  }, 0);
 
  // Get hledger net worth from main cache for comparison
  let hledgerNet = null;
  if (cache && cache['balance']) {
    const rows = Array.isArray(cache['balance']) && Array.isArray(cache['balance'][0]) ? cache['balance'][0] : [];
    let assets = 0, liabilities = 0;
    rows.forEach(row => {
      const { val } = extractAmount(row[3]);
      if (row[0].startsWith('assets')) assets += val;
      if (row[0].startsWith('liabilities')) liabilities += val;
    });
    hledgerNet = assets + liabilities;
  }
 
  const diff = hledgerNet !== null ? Math.round((allEnvTotal - hledgerNet) * 100) / 100 : null;
  const diffColor = diff === null ? '' : Math.abs(diff) < 0.02 ? 'color:var(--positive)' : 'color:var(--negative)';
  const diffLabel = diff === null ? '' : Math.abs(diff) < 0.02 ? 'in sync' : (diff > 0 ? '+' : '') + fmtAmount(diff, '$') + ' vs hledger';
 
  html += '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:24px;margin-bottom:4px">'
    + '<div class="env-section-title" style="margin:0">Envelopes</div>'
    + '<div style="text-align:right">'
    + '<div style="font-size:15px;font-weight:500;font-variant-numeric:tabular-nums;' + amountClass(allEnvTotal) + '">' + fmtAmount(allEnvTotal, '$') + '</div>'
    + (diff !== null ? '<div style="font-size:10px;font-weight:500;letter-spacing:0.3px;' + diffColor + '">' + diffLabel + '</div>' : '')
    + '</div>'
    + '</div>';
 

  const parents = envelopes.filter(e => !e.parent).sort((a, b) => (a.sort_order || 99) - (b.sort_order || 99));

  parents.forEach(parent => {
    const children = envelopes.filter(e => e.parent === parent.id).sort((a, b) => (a.sort_order || 99) - (b.sort_order || 99));
    const unalloc = balances[parent.id] || 0;
    const childSum = children.reduce((s, c) => s + (balances[c.id] || 0), 0);
    const total = unalloc + childSum;

    html += '<div class="env-parent">';
    html += '<div class="env-parent-header">'
      + '<span class="env-parent-name">' + escHtml(parent.name) + '</span>'
      + '<span class="env-parent-total ' + amountClass(total) + '">' + fmtAmount(total, '$') + '</span>'
      + '</div>';

    if (children.length > 0) {
      html += '<div class="env-unalloc-row">'
        + '<span>Unallocated</span>'
        + '<span class="' + amountClass(unalloc) + '">' + fmtAmount(unalloc, '$') + '</span>'
        + '</div>';
    }

    children.forEach(child => {
      const bal = balances[child.id] || 0;
      html += '<div class="env-child" onclick="openEnvDetail(\'' + child.id + '\')">'
        + '<div class="env-child-left"><div class="env-child-name">' + escHtml(child.name) + '</div></div>'
        + '<div class="env-child-right">'
        + '<span class="env-child-balance ' + amountClass(bal) + '">' + fmtAmount(bal, '$') + '</span>'
        + '<span class="env-child-chevron">&#8250;</span>'
        + '</div></div>';
    });

    // Tap parent itself to open detail
    html = html.replace(
      '<div class="env-parent-header">',
      '<div class="env-parent-header" style="cursor:pointer" onclick="openEnvDetail(\'' + parent.id + '\')">'
    );

    html += '</div>';
  });

  html += '<div class="view-footer">Balances are virtual. Real account data is in Balance and Transactions tabs.</div>';
  el.innerHTML = html;
}

function _envName(id) {
  if (!envData) return id;
  const env = (envData.envelopes || []).find(e => e.id === id);
  return env ? env.name : id;
}

// ============================================================================
// Scan transactions
// ============================================================================
async function scanTransactions() {
  try {
    showToast('Scanning...');
    const r = await envFetch('/api/envelopes/scan', 'POST', {});
    const added = r.added || 0;
    showToast(added > 0 ? `Found ${added} new transaction${added === 1 ? '' : 's'}` : 'Nothing new');
    await loadEnvelopes();
  } catch(e) { showToast('Scan failed: ' + e.message, 4000); }
}

// ============================================================================
// Assign sheet — handles both income (split) and expense (single envelope)
// ============================================================================
let _assignTxn = null;

function openAssignSheet(txn) {
  _assignTxn = txn;
  const sheet = document.getElementById('assignSheet');
  const body = document.getElementById('assignBody');
  if (!sheet || !body || !envData) return;

  document.getElementById('assignTitle').textContent = txn.type === 'income' ? 'Allocate income' : 'Assign expense';

  const isIncome = txn.type === 'income';
  const envelopes = envData.envelopes || [];
  const balances = envData.balances || {};

  let html = '';

  // Txn info card
  const amtSign = isIncome ? '+' : '-';
  const amtColor = isIncome ? 'amount-positive' : 'amount-negative';
  html += '<div class="assign-txn-info">'
    + '<div class="assign-txn-desc">' + escHtml(txn.description) + '</div>'
    + '<div class="assign-txn-meta">' + (txn.date || '') + ' · ' + (txn.accounts || []).filter(a => a).join(', ') + '</div>'
    + '<div class="assign-txn-amount ' + amtColor + '">' + amtSign + fmtAmount(txn.amount, '$') + '</div>'
    + '</div>';


  if (isIncome) {
    const defaults = envData.income_split_default || {};
    const tithe_pct = defaults.tithe_pct || 0.10;
    const savings_pct = defaults.savings || 0.40;
 
    const presets = {};
    presets['tithe']    = Math.round(txn.amount * tithe_pct * 100) / 100;
    presets['savings']  = Math.round(txn.amount * savings_pct * 100) / 100;
    presets['chequing'] = Math.round((txn.amount - presets['tithe'] - presets['savings']) * 100) / 100;
 
    html += '<div style="font-size:11px;color:var(--text-muted);font-weight:300;margin-bottom:12px">'
      + 'Split this income across envelopes. Quick actions below.</div>';
 
    // Quick action bar
    html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border)">'
      + '<button onclick="allocQuickDefault(' + txn.amount + ')" style="' + _qbtn() + '">Reset defaults</button>'
      + '<button onclick="allocClearAll()" style="' + _qbtn() + '">Clear all</button>'
      + '<button onclick="allocAllTo()" style="' + _qbtn() + '">All to one</button>'
      + '<button onclick="allocRemaining(' + txn.amount + ')" style="' + _qbtn() + '">Fill remaining</button>'
      + '<button onclick="allocBalance(' + txn.amount + ')" style="' + _qbtn('var(--accent)', '#fff') + '">Auto-balance</button>'
      + '</div>';
 
    html += '<div id="assignSplits">';
    envelopes.forEach(env => {
      const preset = presets[env.id] || 0;
      html += '<div class="assign-split-row">'
        + '<span class="assign-split-name">' + escHtml(env.name) + '</span>'
        + '<input type="number" class="assign-split-input" id="asplit_' + env.id + '" step="0.01" placeholder="0.00"'
        + ' value="' + (preset > 0 ? preset.toFixed(2) : '') + '"'
        + ' oninput="recalcAssignRemainder(' + txn.amount + ')">'
        + '</div>';
    });
    html += '</div>';
    html += '<div class="assign-remainder" id="assignRemainder"></div>';
    html += '<button class="assign-confirm" id="assignConfirm" onclick="submitAssign()" disabled>Allocate income</button>';
    html += '<button class="assign-dismiss" onclick="dismissPending(\'' + txn.txn_id + '\')">Dismiss without assigning</button>';
 
    setTimeout(() => recalcAssignRemainder(txn.amount), 50);

  } else {
    // Expense: pick one envelope
    const suggested = txn.suggested_envelope;
    html += '<div style="font-size:11px;color:var(--text-muted);font-weight:300;margin-bottom:12px">Choose which envelope absorbs this expense.</div>';
    html += '<select class="env-inline-select" id="assignEnvSelect" style="margin-bottom:16px">'
      + '<option value="">Select envelope...</option>';
    envelopes.forEach(env => {
      const bal = balances[env.id] || 0;
      const selected = env.id === suggested ? ' selected' : '';
      html += '<option value="' + env.id + '"' + selected + '>' + escHtml(env.name) + '  (' + fmtAmount(bal, '$') + ')</option>';
    });
    html += '</select>';
    html += '<input type="text" class="env-inline-input" id="assignNote" placeholder="Note (optional)" style="margin-bottom:16px">';
    html += '<button class="assign-confirm" onclick="submitExpenseAssign()">Confirm</button>';
    html += '<button class="assign-dismiss" onclick="dismissPending(\'' + txn.txn_id + '\')">Dismiss without assigning</button>';
  }

  body.innerHTML = html;
  sheet.style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeAssignSheet() {
  document.getElementById('assignSheet').style.display = 'none';
  document.body.style.overflow = '';
  _assignTxn = null;
}

function recalcAssignRemainder(total) {
  if (!envData) return;
  let assigned = 0;
  (envData.envelopes || []).forEach(env => {
    const inp = document.getElementById('asplit_' + env.id);
    assigned += parseFloat(inp ? inp.value : '') || 0;
  });
  const rem = Math.round((total - assigned) * 100) / 100;
  const remEl = document.getElementById('assignRemainder');
  const btn = document.getElementById('assignConfirm');
  if (remEl) {
    if (Math.abs(rem) < 0.01) { remEl.textContent = 'Fully allocated'; remEl.className = 'assign-remainder'; }
    else if (rem > 0) { remEl.textContent = fmtAmount(rem, '$') + ' unassigned'; remEl.className = 'assign-remainder'; }
    else { remEl.textContent = fmtAmount(Math.abs(rem), '$') + ' over-allocated'; remEl.className = 'assign-remainder warn'; }
  }
  if (btn) btn.disabled = Math.abs(rem) >= 0.01;
}

async function submitAssign() {
  if (!_assignTxn || !envData) return;
  const splits = [];
  (envData.envelopes || []).forEach(env => {
    const inp = document.getElementById('asplit_' + env.id);
    const val = parseFloat(inp ? inp.value : '') || 0;
    if (val !== 0) splits.push({ envelope_id: env.id, amount: val });
  });
  const btn = document.getElementById('assignConfirm');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }
  try {
    await envFetch('/api/envelopes/assign', 'POST', { txn_id: _assignTxn.txn_id, splits });
    showToast('Income allocated');
    closeAssignSheet();
    await loadEnvelopes();
  } catch(e) {
    showToast('Error: ' + e.message, 4000);
    if (btn) { btn.disabled = false; btn.textContent = 'Allocate income'; }
  }
}

async function submitExpenseAssign() {
  if (!_assignTxn) return;
  const sel = document.getElementById('assignEnvSelect');
  const note = document.getElementById('assignNote');
  const envId = sel ? sel.value : '';
  if (!envId) { if (sel) sel.style.borderColor = 'var(--negative)'; return; }
  try {
    await envFetch('/api/envelopes/assign', 'POST', {
      txn_id: _assignTxn.txn_id,
      envelope_id: envId,
      note: note ? note.value.trim() : ''
    });
    showToast('Assigned');
    closeAssignSheet();
    await loadEnvelopes();
  } catch(e) { showToast('Error: ' + e.message, 4000); }
}

async function dismissPending(txnId) {
  try {
    await envFetch('/api/envelopes/dismiss', 'POST', { txn_id: txnId });
    showToast('Dismissed');
    closeAssignSheet();
    await loadEnvelopes();
  } catch(e) { showToast('Error: ' + e.message, 4000); }
}

function showEnvForm(envId, formType) {
  const slot = document.getElementById('envFormSlot');
  if (!slot || !envData) return;
  const envelopes = envData.envelopes || [];
  const balances = envData.balances || {};

  let html = '<div class="env-inline-form">';

  if (formType === 'transfer') {

    html += '<div class="env-inline-label">Transfer to</div>'
      + '<select class="env-inline-select" id="envFormDest"><option value="">Select destination...</option>' + options + '</select>'
      + '<input type="number" class="env-inline-input" id="envFormAmt" placeholder="Amount" step="0.01">'
      + '<input type="text" class="env-inline-input" id="envFormNote" placeholder="Note (optional)">'
      + '<button class="env-inline-submit" onclick="submitEnvTransfer(\'' + envId + '\')">Transfer</button>'
      + '<span class="env-inline-cancel" onclick="document.getElementById(\'envFormSlot\').innerHTML=\'\'">Cancel</span>';

    html += '<div class="env-inline-label">Manual adjustment</div>'
      + '<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;font-weight:300">Positive adds, negative subtracts.</div>'

      + '<input type="text" class="env-inline-input" id="envFormNote" placeholder="Reason">'
      + '<button class="env-inline-submit" onclick="submitEnvAdjust(\'' + envId + '\')">Apply</button>'

  html += '</div>';

async function submitEnvTransfer(fromId) {
  const dest = document.getElementById('envFormDest');
  const amt = parseFloat(document.getElementById('envFormAmt')?.value || '');
  const note = document.getElementById('envFormNote')?.value.trim();
  if (!dest?.value) { dest.style.borderColor = 'var(--negative)'; return; }
  if (isNaN(amt) || amt === 0) { document.getElementById('envFormAmt').style.borderColor = 'var(--negative)'; return; }
  try {
    await envFetch('/api/envelopes/transfer', 'POST', { from_envelope: fromId, to_envelope: dest.value, amount: amt, note });
    showToast('Transferred');
    _doCloseTxnDetail();
    await loadEnvelopes();
  } catch(e) { showToast('Error: ' + e.message, 4000); }
}

async function submitEnvAdjust(envId) {
  const amt = parseFloat(document.getElementById('envFormAmt')?.value || '');
  const note = document.getElementById('envFormNote')?.value.trim();
  if (isNaN(amt) || amt === 0) { document.getElementById('envFormAmt').style.borderColor = 'var(--negative)'; return; }
  try {
    await envFetch('/api/envelopes/adjust', 'POST', { envelope: envId, amount: amt, note });
    showToast('Adjusted');
    _doCloseTxnDetail();
    await loadEnvelopes();
  } catch(e) { showToast('Error: ' + e.message, 4000); }
}

async function deleteEnvConfirm(envId) {
  const name = _envName(envId);
  const bal = (envData?.balances || {})[envId] || 0;
  if (Math.abs(bal) > 0.01) {
    showToast('Transfer balance out first before deleting', 3500);
    return;
  }
  if (!confirm('Delete "' + name + '"? This cannot be undone.')) return;
  try {
    await envFetch('/api/envelopes/' + envId, 'DELETE', null);
    showToast('Deleted');
    _doCloseTxnDetail();
    await loadEnvelopes();
  } catch(e) { showToast('Error: ' + e.message, 4000); }
}


function openIncomeCorrection(txnId, fromEnvId) {
  // Find all history entries for this txn_id across all envelopes
  if (!envData) return;
  const allHistory = envData.history || [];
  const txnEntries = allHistory.filter(h => h.txn_id === txnId && h.type === 'income_allocation');
  if (txnEntries.length === 0) { showToast('No allocation found for this transaction', 3000); return; }
 
  const totalAllocated = txnEntries.reduce((s, h) => s + h.amount, 0);
  const desc = txnEntries[0].note || 'Income';
  const date = txnEntries[0].date || '';
 
  // Open a correction sheet showing current breakdown
  const slot = document.getElementById('envFormSlot');
  if (!slot) return;
 
  const envelopes = envData.envelopes || [];
  const currentSplits = {};
  txnEntries.forEach(h => { currentSplits[h.envelope] = h.amount; });
 
  let html = '<div class="env-inline-form" style="margin-top:12px">';
  html += '<div class="env-inline-label">Correct income allocation</div>';
  html += '<div style="font-size:11px;color:var(--text-muted);font-weight:300;margin-bottom:10px">'
    + escHtml(desc) + ' on ' + date + ' — total ' + fmtAmount(totalAllocated, '$')
    + '<br>Adjust any amounts. Changes are additive adjustments.</div>';
 
  envelopes.forEach(env => {
    const cur = currentSplits[env.id] || 0;
    html += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)">'
      + '<span style="font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escHtml(env.name) + '</span>'
      + '<span style="font-size:11px;color:var(--text-muted);font-weight:300;flex-shrink:0">' + (cur > 0 ? 'was ' + fmtAmount(cur, '$') : '') + '</span>'
      + '<input type="number" step="0.01" placeholder="new amt" value="' + (cur > 0 ? cur.toFixed(2) : '') + '" id="icorr_' + env.id + '" style="font-family:\'Montserrat\',sans-serif;font-size:13px;width:80px;border:1px solid var(--border);border-radius:4px;padding:6px 8px;text-align:right;background:var(--surface);color:var(--text);outline:none">'
      + '</div>';
  });
 
  html += '<div style="font-size:11px;color:var(--text-muted);font-weight:300;padding:8px 0">Note: this creates adjustment entries for the differences. History is preserved.</div>';
  html += '<button class="env-inline-submit" style="margin-top:10px" onclick="submitIncomeCorrection(\'' + txnId + '\',' + JSON.stringify(currentSplits) + ')">Apply corrections</button>';
  html += '<span class="env-inline-cancel" onclick="document.getElementById(\'envFormSlot\').innerHTML=\'\'">Cancel</span>';
  html += '</div>';
 
  slot.innerHTML = html;
  slot.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
 
async function submitIncomeCorrection(txnId, oldSplits) {
  if (!envData) return;
  const envelopes = envData.envelopes || [];
  const corrections = [];
 
  envelopes.forEach(env => {
    const inp = document.getElementById('icorr_' + env.id);
    const newVal = parseFloat(inp?.value || '') || 0;
    const oldVal = oldSplits[env.id] || 0;
    const diff = Math.round((newVal - oldVal) * 100) / 100;
    if (Math.abs(diff) > 0.005) {
      corrections.push({ envelope_id: env.id, diff });
    }
  });
 
  if (corrections.length === 0) {
    showToast('No changes made');
    document.getElementById('envFormSlot').innerHTML = '';
    return;
  }
 
  try {
    // Apply each correction as an adjustment
    for (const c of corrections) {
      await envFetch('/api/envelopes/adjust', 'POST', {
        envelope: c.envelope_id,
        amount: c.diff,
        note: 'Income correction (' + txnId.slice(0, 20) + ')'
      });
    }
    showToast('Corrections applied');
    document.getElementById('envFormSlot').innerHTML = '';
    _doCloseTxnDetail();
    await loadEnvelopes();
  } catch(e) { showToast('Error: ' + e.message, 4000); }
}
 


// Style helper for quick action buttons
function _qbtn(bg, color) {
  const b = bg || 'var(--bg)';
  const c = color || 'var(--text)';
  return 'font-family:\'Montserrat\',sans-serif;font-size:11px;font-weight:600;letter-spacing:0.3px;text-transform:uppercase;background:' + b + ';color:' + c + ';border:1px solid var(--border);border-radius:4px;padding:6px 10px;cursor:pointer;touch-action:manipulation;flex-shrink:0';
}
 
// Reset to default percentage splits
function allocQuickDefault(total) {
  if (!envData) return;
  const defaults = envData.income_split_default || {};
  const tithe_pct   = defaults.tithe_pct || 0.10;
  const savings_pct = defaults.savings   || 0.40;
  const tithe   = Math.round(total * tithe_pct * 100) / 100;
  const savings = Math.round(total * savings_pct * 100) / 100;
  const cheq    = Math.round((total - tithe - savings) * 100) / 100;
  const presets = { tithe, savings, chequing: cheq };
  (envData.envelopes || []).forEach(env => {
    const inp = document.getElementById('asplit_' + env.id);
    if (!inp) return;
    const val = presets[env.id] || 0;
    inp.value = val > 0 ? val.toFixed(2) : '';
  });
  recalcAssignRemainder(total);
}
 
// Clear all split inputs
function allocClearAll() {
  if (!envData) return;
  (envData.envelopes || []).forEach(env => {
    const inp = document.getElementById('asplit_' + env.id);
    if (inp) inp.value = '';
  });
  // Get total from current txn
  const btn = document.getElementById('assignConfirm');
  if (btn) btn.disabled = true;
  const remEl = document.getElementById('assignRemainder');
  if (remEl) { remEl.textContent = ''; remEl.className = 'assign-remainder'; }
}
 
// Allocate all to one envelope (prompts with a select)
function allocAllTo() {
  if (!envData) return;
  const envelopes = envData.envelopes || [];
  // Build a quick inline picker
  const existing = document.getElementById('allocAllToSelect');
  if (existing) { existing.remove(); return; }
  const container = document.getElementById('assignSplits');
  if (!container) return;
  const sel = document.createElement('div');
  sel.id = 'allocAllToSelect';
  sel.style.cssText = 'background:var(--surface);border:1px solid var(--accent);border-radius:var(--radius);padding:10px;margin-bottom:10px;';
  sel.innerHTML = '<div style="font-size:11px;color:var(--text-muted);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px">Allocate all to which envelope?</div>'
    + envelopes.map(env =>
        '<button onclick="allocAllToEnv(\'' + env.id + '\')" style="display:block;width:100%;text-align:left;font-family:\'Montserrat\',sans-serif;font-size:13px;background:none;border:none;border-bottom:1px solid var(--border);padding:9px 0;cursor:pointer;color:var(--text)">'
        + escHtml(env.name) + '</button>'
      ).join('');
  container.before(sel);
}
 
function allocAllToEnv(envId) {
  if (!envData) return;
  // Find current total from the assignRemainder text or reconstruct
  // We get total from the assign-confirm button context — grab from last known txn
  if (!_assignTxn) return;
  const total = _assignTxn.amount;
  (envData.envelopes || []).forEach(env => {
    const inp = document.getElementById('asplit_' + env.id);
    if (!inp) return;
    inp.value = env.id === envId ? total.toFixed(2) : '';
  });
  document.getElementById('allocAllToSelect')?.remove();
  recalcAssignRemainder(total);
}
 
// Auto-balance: take the overallocation or underallocation and adjust chequing to compensate
function allocBalance(total) {
  if (!envData || !_assignTxn) return;
  let assigned = 0;
  (envData.envelopes || []).forEach(env => {
    const inp = document.getElementById('asplit_' + env.id);
    assigned += parseFloat(inp?.value || '') || 0;
  });
  const rem = Math.round((total - assigned) * 100) / 100;
  if (Math.abs(rem) < 0.01) { showToast('Already balanced'); return; }
 
  // Apply the remainder to chequing (or first envelope if chequing not found)
  const targetId = (envData.envelopes || []).find(e => e.id === 'chequing')?.id
                || (envData.envelopes || [])[0]?.id;
  if (!targetId) return;
  const inp = document.getElementById('asplit_' + targetId);
  if (!inp) return;
  const cur = parseFloat(inp.value || '') || 0;
  inp.value = Math.round((cur + rem) * 100) / 100 > 0
    ? (Math.round((cur + rem) * 100) / 100).toFixed(2)
    : '0.00';
  recalcAssignRemainder(total);
  showToast(rem > 0 ? '+' + fmtAmount(rem, '$') + ' added to ' + _envName(targetId) : fmtAmount(Math.abs(rem), '$') + ' removed from ' + _envName(targetId));
}
 
// Fill remaining: opens a picker to choose which envelope gets the leftover
function allocRemaining(total) {
  if (!envData) return;
  let assigned = 0;
  (envData.envelopes || []).forEach(env => {
    const inp = document.getElementById('asplit_' + env.id);
    assigned += parseFloat(inp?.value || '') || 0;
  });
  const rem = Math.round((total - assigned) * 100) / 100;
  if (rem <= 0) { showToast(rem === 0 ? 'Nothing remaining' : 'Over-allocated — use Auto-balance'); return; }
 
  const envelopes = envData.envelopes || [];
  const existing = document.getElementById('allocRemainingSelect');
  if (existing) { existing.remove(); return; }
  const container = document.getElementById('assignSplits');
  if (!container) return;
  const sel = document.createElement('div');
  sel.id = 'allocRemainingSelect';
  sel.style.cssText = 'background:var(--surface);border:1px solid var(--accent);border-radius:var(--radius);padding:10px;margin-bottom:10px;';
  sel.innerHTML = '<div style="font-size:11px;color:var(--text-muted);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px">Add remaining ' + fmtAmount(rem, '$') + ' to which envelope?</div>'
    + envelopes.map(env =>
        '<button onclick="allocRemainingToEnv(\'' + env.id + '\',' + rem + ',' + total + ')" style="display:block;width:100%;text-align:left;font-family:\'Montserrat\',sans-serif;font-size:13px;background:none;border:none;border-bottom:1px solid var(--border);padding:9px 0;cursor:pointer;color:var(--text)">'
        + escHtml(env.name) + '</button>'
      ).join('');
  container.before(sel);
}
 
function allocRemainingToEnv(envId, rem, total) {
  const inp = document.getElementById('asplit_' + envId);
  if (!inp) return;
  const cur = parseFloat(inp.value || '') || 0;
  inp.value = Math.round((cur + rem) * 100) / 100 > 0
    ? (Math.round((cur + rem) * 100) / 100).toFixed(2)
    : inp.value;
  document.getElementById('allocRemainingSelect')?.remove();
  recalcAssignRemainder(total);
}
 

// ============================================================================
// New envelope sheet
// ============================================================================
function openNewEnvSheet() {
  if (!envData) return;
  const parents = (envData.envelopes || []).filter(e => !e.parent);
  const options = parents.map(e => '<option value="' + e.id + '">' + escHtml(e.name) + '</option>').join('');

  const overlay = document.getElementById('txnDetailOverlay');
  document.getElementById('txnDetailDesc').textContent = 'New envelope';
  document.getElementById('txnDetailDate').textContent = '';
  document.getElementById('txnDetailBody').innerHTML =
    '<div style="padding:4px 0 16px">'
    + '<div style="font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px">Name</div>'
    + '<input type="text" id="newEnvName" class="env-inline-input" placeholder="e.g. Car Insurance" style="margin-bottom:16px">'
    + '<div style="font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--text-muted);margin-bottom:10px">Parent</div>'
    + '<select id="newEnvParent" class="env-inline-select" style="margin-bottom:20px">'
    + '<option value="">No parent (top-level)</option>'
    + options
    + '</select>'
    + '<button class="env-inline-submit" onclick="submitNewEnv()">Create envelope</button>'
    + '</div>';

  overlay.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  requestAnimationFrame(() => { overlay.classList.add('open'); _initSheetSwipe(); });
  setTimeout(() => document.getElementById('newEnvName')?.focus(), 100);
}

async function submitNewEnv() {
  const name = document.getElementById('newEnvName')?.value.trim();
  const parent = document.getElementById('newEnvParent')?.value || null;
  if (!name) { document.getElementById('newEnvName').style.borderColor = 'var(--negative)'; return; }
  try {
    await envFetch('/api/envelopes/create', 'POST', { name, parent: parent || null });
    showToast('Envelope created');
    _doCloseTxnDetail();
    await loadEnvelopes();
  } catch(e) { showToast('Error: ' + e.message, 4000); }
}

// ============================================================================
// Generic fetch helper
// ============================================================================
async function envFetch(path, method, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== null) opts.body = JSON.stringify(body);
  const r = await fetch(`${API}${path}`, opts);
  if (!r.ok) {
    let detail = '';
    try { const j = await r.json(); detail = j.detail || ''; } catch(e) {}
    throw new Error(detail || 'status ' + r.status);
  }
  return r.json();
}

// Keep apiFetch alias for any remaining calls
const apiFetch = envFetch;
