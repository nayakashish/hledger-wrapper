  ENVELOPES TAB
  
  INTEGRATION STEPS for index.html:
  
  1. Add nav button (replace the "Income" button):
     <button onclick="showView('envelopes', this)">Envelopes</button>
  
  2. Add view div after the other view divs:
     <div id="view-envelopes" class="view"><div class="state-msg">Tap sync to load data.</div></div>
  
  3. Add the CSS block below into the <style> tag
  
  4. Add the JS block below into the <script> tag
  
  5. In loadAll(), add:
     loadEnvelopes(),
  
  6. In renderView(), add:
     if (name === 'envelopes') renderEnvelopes(el, data);
  
  7. In the showView() nav handler, envelopes uses cache['envelopes']
-->

<script id="envelope-js">

  // ── Envelope state ────────────────────────────────────────────────────────
  let envelopeData = null;  // raw from API
  const ENV_CACHE_KEY = 'hledger_envelopes';

  function saveEnvelopeCache(data) {
    try { localStorage.setItem(ENV_CACHE_KEY, JSON.stringify(data)); } catch(e) {}
  }
  function loadEnvelopeCache() {
    try { const r = localStorage.getItem(ENV_CACHE_KEY); return r ? JSON.parse(r) : null; } catch(e) { return null; } 
  }

  async function loadEnvelopes() {
    const cached = loadEnvelopeCache();
    if (cached) { envelopeData = cached; cache['envelopes'] = cached; }
    if (isDemoMode()) return;
    try {
      const r = await fetch(`${API}/api/envelopes`);
      if (!r.ok) return;
      const data = await r.json();
      envelopeData = data;
      cache['envelopes'] = data;
      saveEnvelopeCache(data);
    } catch(e) { /* envelopes are optional, fail silently */ }
  }

  // ── Render envelopes tab ──────────────────────────────────────────────────
  function renderEnvelopes(el, data) {
    if (!data || data.error) {
      el.innerHTML = '<div class="state-msg">Envelopes not configured.</div>'
        + '<div class="view-footer">Add envelope_config.json and envelopes.json to your journal repo to get started.</div>';
      return;
    }

    envelopeData = data;
    const envelopes = data.envelopes || [];

    // Build lookup
    const byId = {};
    envelopes.forEach(e => { byId[e.id] = e; });

    // Containers = top-level
    const containers = envelopes.filter(e => !e.parent);

    let html = '';

    // Action bar
    html += '<div class="env-allocate-bar">'
      + '<button class="env-allocate-btn" onclick="openAllocateSheet()">+ Allocate Income</button>'
      + '<button class="env-match-btn" id="envMatchBtn" onclick="runMatch()">Match Txns</button>'
      + '</div>';

    // Containers
    containers.forEach(container => {
      const children = envelopes.filter(e => e.parent === container.id)
        .sort((a, b) => (a.sort_order || 99) - (b.sort_order || 99));

      const childSum = children.reduce((sum, c) => sum + (c.balance || 0), 0);
      const containerBal = (container.balance || 0) + childSum;
      const free = container.balance || 0;

      html += '<div class="env-container">';

      // Container header
      html += '<div class="env-container-header" onclick="toggleContainer(\'' + container.id + '\')">'
        + '<span class="env-container-name">' + escHtml(container.name) + '</span>'
        + '<span class="env-container-total ' + amountClass(containerBal) + '">'
        + fmtAmount(containerBal, '$') + '</span>'
        + '</div>';

      // Free row
      if (children.length > 0) {
        html += '<div class="env-free-row">'
          + '<span class="env-free-label">Unallocated</span>'
          + '<span class="env-free-value ' + amountClass(free) + '">' + fmtAmount(free, '$') + '</span>'
          + '</div>';
      }

      // Children
      html += '<div class="env-children" id="env-children-' + container.id + '">';
      children.forEach(child => {
        const meta = envRowMeta(child);
        html += '<div class="env-row" onclick="openEnvDetail(\'' + child.id + '\')">'
          + '<div class="env-row-left">'
          + '<div class="env-row-name">' + escHtml(child.name) + '</div>'
          + (meta ? '<div class="env-row-meta">' + meta + '</div>' : '')
          + '</div>'
          + '<div class="env-row-right">'
          + '<span class="env-row-balance ' + amountClass(child.balance || 0) + '">'
          + fmtAmount(child.balance || 0, '$') + '</span>'
          + '<span class="env-row-chevron">&#8250;</span>'
          + '</div>'
          + '</div>';
      });
      html += '</div></div>'; // env-children, env-container
    });

    // Config overview
    html += '<div class="section-title" style="margin-top:24px">Config</div>';
    const defaults = data.income_split_default || {};
    html += '<div style="margin-bottom:20px">';
    if (defaults.savings !== undefined)
      html += '<div class="env-config-row"><span class="env-config-label">Income split: savings</span><span class="env-config-value">' + Math.round((defaults.savings||0)*100) + '%</span></div>';
    if (defaults.chequing !== undefined)
      html += '<div class="env-config-row"><span class="env-config-label">Income split: chequing</span><span class="env-config-value">' + Math.round((defaults.chequing||0)*100) + '%</span></div>';
    if (defaults.tithe_pct !== undefined)
      html += '<div class="env-config-row"><span class="env-config-label">Tithe (of gross)</span><span class="env-config-value">' + Math.round((defaults.tithe_pct||0)*100) + '%</span></div>';

    const autoEnvs = (data.envelopes||[]).filter(e => e.monthly_amount > 0);
    if (autoEnvs.length > 0) {
      html += '<div class="env-config-row" style="margin-top:8px"><span class="env-config-label" style="font-weight:600;color:var(--accent)">Auto-accrual (1st of month)</span></div>';
      autoEnvs.forEach(e => {
        html += '<div class="env-config-row"><span class="env-config-label" style="padding-left:12px">' + escHtml(e.name) + '</span><span class="env-config-value">+' + fmtAmount(e.monthly_amount, '$') + '/mo</span></div>';
      });
    }
    html += '</div>';

    html += '<div class="view-footer">Envelopes are virtual. Real balances live in the other tabs via hledger.</div>';
    el.innerHTML = html;
  }

  function envRowMeta(env) {
    const parts = [];
    if (env.type === 'sinking_fund') parts.push('sinking fund');
    if (env.type === 'budget') parts.push('monthly budget');
    if (env.type === 'promise') parts.push('promise');
    if (env.monthly_amount > 0) parts.push('+' + fmtAmount(env.monthly_amount, '$') + '/mo');
    return parts.join(' · ');
  }

  function toggleContainer(id) {
    const el = document.getElementById('env-children-' + id);
    if (!el) return;
    el.style.display = el.style.display === 'none' ? '' : 'none';
  }

  // ── Envelope detail sheet ─────────────────────────────────────────────────
  function openEnvDetail(envId) {
    if (!envelopeData) return;
    const env = (envelopeData.envelopes || []).find(e => e.id === envId);
    if (!env) return;

    const overlay = document.getElementById('txnDetailOverlay');
    const descEl  = document.getElementById('txnDetailDesc');
    const dateEl  = document.getElementById('txnDetailDate');
    const bodyEl  = document.getElementById('txnDetailBody');

    descEl.textContent = env.name;
    dateEl.textContent = envTypeLabelFull(env);

    const bal = env.balance || 0;
    let html = '';

    // Balance + type
    html += '<div class="env-detail-section">'
      + '<div class="env-detail-balance-big ' + amountClass(bal) + '">' + fmtAmount(bal, '$') + '</div>'
      + '<span class="env-detail-type-badge">' + (env.type || 'envelope') + '</span>'
      + '</div>';

    // Action buttons
    html += '<div class="env-action-row">'
      + '<button class="env-action-btn primary" onclick="showEnvForm(\'' + envId + '\', \'pay\')">Mark Paid</button>'
      + '<button class="env-action-btn secondary" onclick="showEnvForm(\'' + envId + '\', \'transfer\')">Transfer</button>'
      + '<button class="env-action-btn secondary" onclick="showEnvForm(\'' + envId + '\', \'adjust\')">Adjust</button>'
      + '</div>';

    // Forms container
    html += '<div id="envFormContainer"></div>';

    // History
    const history = (env.history || []).slice().reverse();
    if (history.length > 0) {
      html += '<div class="env-detail-section">'
        + '<div class="env-detail-section-label">History</div>';
      history.forEach(h => {
        const positive = h.amount > 0;
        html += '<div class="env-history-row">'
          + '<div class="env-history-left">'
          + '<div class="env-history-note">' + escHtml(h.note || h.type) + '</div>'
          + '<div class="env-history-date">' + (h.date || '') + '</div>'
          + '</div>'
          + '<div class="env-history-amount ' + (positive ? 'amount-positive' : 'amount-negative') + '">'
          + (positive ? '+' : '') + fmtAmount(h.amount, '$') + '</div>'
          + '</div>';
      });
      html += '</div>';
    } else {
      html += '<div class="env-detail-section"><div class="env-detail-section-label">History</div>'
        + '<div style="font-size:12px;color:var(--text-muted);font-weight:300;padding:8px 0">No activity yet.</div></div>';
    }

    bodyEl.innerHTML = html;
    overlay.style.display = 'flex';
    document.body.style.overflow = 'hidden';
    requestAnimationFrame(() => { overlay.classList.add('open'); _initSheetSwipe(); });
  }

  function envTypeLabelFull(env) {
    if (env.type === 'promise') return 'Promise envelope';
    if (env.type === 'sinking_fund') {
      const m = env.monthly_amount > 0 ? ' · +' + fmtAmount(env.monthly_amount, '$') + '/mo' : '';
      return 'Sinking fund' + m;
    }
    if (env.type === 'budget') {
      const m = env.monthly_amount > 0 ? ' · ' + fmtAmount(env.monthly_amount, '$') + '/mo' : '';
      return 'Monthly budget' + m;
    }
    return env.type || 'Envelope';
  }

  function showEnvForm(envId, formType) {
    const container = document.getElementById('envFormContainer');
    if (!container) return;
    if (!envelopeData) return;
    const env = (envelopeData.envelopes || []).find(e => e.id === envId);
    const allEnvs = (envelopeData.envelopes || []).filter(e => e.id !== envId && e.type !== 'container');

    let html = '<div class="env-inline-form">';

    if (formType === 'pay') {
      html += '<div class="env-inline-form-title">Mark payment made</div>'
        + '<input type="number" class="env-inline-input" id="envFormAmt" placeholder="Amount paid" step="0.01" value="' + ((env && env.balance > 0) ? (env.balance).toFixed(2) : '') + '">'
        + '<input type="text" class="env-inline-input" id="envFormNote" placeholder="Note (optional)">'
        + '<button class="env-inline-submit" onclick="submitEnvForm(\'' + envId + '\', \'pay\')">Confirm payment</button>'
        + '<span class="env-inline-cancel" onclick="document.getElementById(\'envFormContainer\').innerHTML=\'\'">Cancel</span>';
    } else if (formType === 'transfer') {
      const options = allEnvs.map(e => '<option value="' + e.id + '">' + escHtml(e.name) + '</option>').join('');
      html += '<div class="env-inline-form-title">Transfer to envelope</div>'
        + '<select class="env-inline-select" id="envFormDest"><option value="">Select destination...</option>' + options + '</select>'
        + '<input type="number" class="env-inline-input" id="envFormAmt" placeholder="Amount" step="0.01">'
        + '<input type="text" class="env-inline-input" id="envFormNote" placeholder="Note (optional)">'
        + '<button class="env-inline-submit" onclick="submitEnvForm(\'' + envId + '\', \'transfer\')">Transfer</button>'
        + '<span class="env-inline-cancel" onclick="document.getElementById(\'envFormContainer\').innerHTML=\'\'">Cancel</span>';
    } else if (formType === 'adjust') {
      html += '<div class="env-inline-form-title">Manual adjustment</div>'
        + '<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;font-weight:300">Positive adds, negative subtracts.</div>'
        + '<input type="number" class="env-inline-input" id="envFormAmt" placeholder="+50 or -25" step="0.01">'
        + '<input type="text" class="env-inline-input" id="envFormNote" placeholder="Reason">'
        + '<button class="env-inline-submit" onclick="submitEnvForm(\'' + envId + '\', \'adjust\')">Apply</button>'
        + '<span class="env-inline-cancel" onclick="document.getElementById(\'envFormContainer\').innerHTML=\'\'">Cancel</span>';
    }

    html += '</div>';
    container.innerHTML = html;
    const inp = document.getElementById('envFormAmt');
    if (inp) inp.focus();
  }

  async function submitEnvForm(envId, formType) {
    const amtInput  = document.getElementById('envFormAmt');
    const noteInput = document.getElementById('envFormNote');
    const submitBtn = document.querySelector('#envFormContainer .env-inline-submit');

    const amt  = parseFloat(amtInput ? amtInput.value : '');
    const note = noteInput ? noteInput.value.trim() : '';

    if (isNaN(amt) || amt === 0) { amtInput && (amtInput.style.borderColor = 'var(--negative)'); return; }
    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Saving...'; }

    try {
      if (formType === 'pay') {
        await apiFetch('/api/envelopes/transfer', 'POST', { from_envelope: envId, amount: amt, note: note || 'Payment made' });
      } else if (formType === 'transfer') {
        const dest = document.getElementById('envFormDest');
        const destVal = dest ? dest.value : '';
        if (!destVal) { dest && (dest.style.borderColor = 'var(--negative)'); if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Transfer'; } return; }
        await apiFetch('/api/envelopes/transfer', 'POST', { from_envelope: envId, to_envelope: destVal, amount: amt, note });
      } else if (formType === 'adjust') {
        await apiFetch('/api/envelopes/adjust', 'POST', { envelope: envId, amount: amt, note });
      }
      showToast('Saved');
      _doCloseTxnDetail();
      await loadEnvelopes();
      const el = document.getElementById('view-envelopes');
      if (el && el.classList.contains('active') && envelopeData) renderEnvelopes(el, envelopeData);
    } catch(e) {
      showToast('Error: ' + e.message, 4000);
      if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Try again'; }
    }
  }

  // ── Allocate income sheet ─────────────────────────────────────────────────
  function openAllocateSheet() {
    if (isDemoMode()) { showToast('Disabled in demo mode'); return; }
    const sheet = document.getElementById('allocSheet');
    if (sheet) { sheet.style.display = 'flex'; document.body.style.overflow = 'hidden'; renderAllocSheet(null); }
  }
  function closeAllocSheet() {
    const sheet = document.getElementById('allocSheet');
    if (sheet) { sheet.style.display = 'none'; document.body.style.overflow = ''; }
  }

  function renderAllocSheet(grossOverride) {
    const body = document.getElementById('allocBody');
    if (!body || !envelopeData) return;

    const defaults = envelopeData.income_split_default || {};
    const today = new Date().toISOString().slice(0, 10);

    body.innerHTML =
      '<div style="font-size:11px;color:var(--text-muted);font-weight:300;margin-bottom:16px">Enter the gross income amount. Splits are pre-filled from your default config.</div>'
      + '<input type="number" class="alloc-gross-input" id="allocGross" placeholder="0.00" step="0.01" value="' + (grossOverride || '') + '" oninput="recalcAllocSplits()">'
      + '<input type="date" class="alloc-date-input" id="allocDate" value="' + today + '">'
      + '<input type="text" class="alloc-note-input" id="allocNote" placeholder="Note (e.g. Jan paycheque)">'
      + '<div class="alloc-splits-label">Allocation</div>'
      + '<div id="allocSplitsContainer"></div>'
      + '<div class="alloc-remainder" id="allocRemainder"></div>'
      + '<button class="alloc-confirm" id="allocConfirm" onclick="submitAllocate()" disabled>Confirm allocation</button>';

    renderAllocSplits(0, defaults);
    setTimeout(() => {
      const inp = document.getElementById('allocGross');
      if (inp) { inp.focus(); inp.addEventListener('input', recalcAllocSplits); }
    }, 50);
  }

  function getSplitEnvelopes() {
    if (!envelopeData) return [];
    const defaults = envelopeData.income_split_default || {};
    // Always show savings, chequing, tithe as the main splits
    const primaryIds = ['savings', 'chequing', 'tithe'];
    return primaryIds.map(id => {
      const env = (envelopeData.envelopes || []).find(e => e.id === id);
      return env ? { id, name: env.name } : null;
    }).filter(Boolean);
  }

  function renderAllocSplits(gross, defaults) {
    const container = document.getElementById('allocSplitsContainer');
    if (!container) return;

    const splitEnvs = getSplitEnvelopes();
    const tithe   = gross > 0 ? Math.round(gross * (defaults.tithe_pct || 0.10) * 100) / 100 : 0;
    const savings  = gross > 0 ? Math.round(gross * (defaults.savings  || 0.40) * 100) / 100 : 0;
    const chequing = gross > 0 ? Math.round(Math.max(0, gross * (defaults.chequing || 0.50) - tithe) * 100) / 100 : 0;

    const presets = { savings, chequing, tithe };

    let html = '';
    splitEnvs.forEach(env => {
      const val = presets[env.id] || 0;
      html += '<div class="alloc-split-row">'
        + '<span class="alloc-split-name">' + escHtml(env.name) + '</span>'
        + '<input type="number" class="alloc-split-input" id="allocSplit_' + env.id + '" step="0.01" value="' + (val > 0 ? val.toFixed(2) : '') + '" placeholder="0.00" oninput="recalcAllocRemainder()">'
        + '</div>';
    });
    container.innerHTML = html;
    recalcAllocRemainder();
  }

  function recalcAllocSplits() {
    const grossEl = document.getElementById('allocGross');
    const gross = parseFloat(grossEl ? grossEl.value : '') || 0;
    const defaults = (envelopeData || {}).income_split_default || {};
    renderAllocSplits(gross, defaults);
  }

  function recalcAllocRemainder() {
    const grossEl = document.getElementById('allocGross');
    const gross = parseFloat(grossEl ? grossEl.value : '') || 0;
    const splitEnvs = getSplitEnvelopes();
    let assigned = 0;
    splitEnvs.forEach(env => {
      const inp = document.getElementById('allocSplit_' + env.id);
      assigned += parseFloat(inp ? inp.value : '') || 0;
    });
    const rem = Math.round((gross - assigned) * 100) / 100;
    const remEl = document.getElementById('allocRemainder');
    const btn   = document.getElementById('allocConfirm');
    if (remEl) {
      if (gross === 0) { remEl.textContent = ''; remEl.className = 'alloc-remainder'; }
      else if (Math.abs(rem) < 0.01) { remEl.textContent = 'Fully allocated'; remEl.className = 'alloc-remainder'; }
      else if (rem > 0) { remEl.textContent = fmtAmount(rem, '$') + ' unassigned'; remEl.className = 'alloc-remainder'; }
      else { remEl.textContent = fmtAmount(Math.abs(rem), '$') + ' over-allocated'; remEl.className = 'alloc-remainder warn'; }
    }
    if (btn) btn.disabled = gross === 0 || Math.abs(rem) >= 0.01;
  }

  async function submitAllocate() {
    const grossEl = document.getElementById('allocGross');
    const dateEl  = document.getElementById('allocDate');
    const noteEl  = document.getElementById('allocNote');
    const btn     = document.getElementById('allocConfirm');

    const gross = parseFloat(grossEl ? grossEl.value : '') || 0;
    if (gross <= 0) return;

    const splits = {};
    const splitEnvs = getSplitEnvelopes();
    splitEnvs.forEach(env => {
      const inp = document.getElementById('allocSplit_' + env.id);
      const val = parseFloat(inp ? inp.value : '') || 0;
      if (val !== 0) splits[env.id] = val;
    });

    if (btn) { btn.disabled = true; btn.textContent = 'Saving...'; }

    try {
      await apiFetch('/api/envelopes/allocate', 'POST', {
        amount: gross,
        date:   dateEl ? dateEl.value : null,
        note:   noteEl ? noteEl.value.trim() : null,
        splits
      });
      showToast('Income allocated');
      closeAllocSheet();
      await loadEnvelopes();
      const el = document.getElementById('view-envelopes');
      if (el && el.classList.contains('active') && envelopeData) renderEnvelopes(el, envelopeData);
    } catch(e) {
      showToast('Error: ' + e.message, 4000);
      if (btn) { btn.disabled = false; btn.textContent = 'Confirm allocation'; }
    }
  }

  // ── Match transactions ────────────────────────────────────────────────────
  async function runMatch() {
    const btn = document.getElementById('envMatchBtn');
    if (btn) { btn.disabled = true; btn.textContent = 'Matching...'; }
    try {
      const r = await apiFetch('/api/envelopes/match', 'POST', {});
      const count = r.count || 0;
      showToast(count > 0 ? `Matched ${count} transaction${count === 1 ? '' : 's'}` : 'Nothing new to match');
      if (count > 0) {
        await loadEnvelopes();
        const el = document.getElementById('view-envelopes');
        if (el && el.classList.contains('active') && envelopeData) renderEnvelopes(el, envelopeData);
      }
    } catch(e) {
      showToast('Match failed: ' + e.message, 4000);
    } finally {
      if (btn) { btn.disabled = false; btn.textContent = 'Match Txns'; }
    }
  }

  // ── Generic API fetch helper ──────────────────────────────────────────────
  async function apiFetch(path, method, body) {
    const r = await fetch(`${API}${path}`, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!r.ok) {
      let detail = '';
      try { const j = await r.json(); detail = j.detail || ''; } catch(e) {}
      throw new Error(detail || 'status ' + r.status);
    }
    return r.json();
  }

</script>
